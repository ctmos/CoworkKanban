<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>CoworkDashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --nav-bg:#1e293b;--nav-text:#e2e8f0;--bg:#f1f5f9;--card-bg:#fff;
  --heute-bg:#ede9fe;--lane-bg:#f8fafc;--border:#e2e8f0;
  --dot-gray:#9ca3af;--dot-red:#ef4444;--dot-yellow:#eab308;--dot-green:#22c55e;
  --primary:#6366f1;--primary-hover:#4f46e5;--danger:#ef4444;
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:#1e293b;min-height:100vh;display:flex;flex-direction:column;}
/* NAV */
.nav{background:var(--nav-bg);display:flex;gap:0;overflow-x:auto;position:sticky;top:0;z-index:100;}
.nav button{background:none;border:none;color:var(--nav-text);padding:14px 22px;font-size:15px;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;transition:.2s;}
.nav button:hover{background:#334155;}
.nav button.active{border-bottom-color:var(--primary);color:#fff;background:#334155;}
/* TABS */
.tab{display:none;flex:1;overflow:hidden;}
.tab.active{display:flex;flex-direction:column;}
/* PROJEKTE */
#tab-projekte{flex-direction:row;overflow:hidden;}
.lanes-container{display:flex;gap:16px;padding:16px;overflow-x:auto;flex:1;align-items:flex-start;}
.lane{min-width:300px;max-width:300px;background:var(--lane-bg);border-radius:12px;border:1px solid var(--border);display:flex;flex-direction:column;max-height:calc(100vh - 60px);}
.lane.heute-lane{background:var(--heute-bg);border-color:#c4b5fd;}
.lane-header{padding:12px 14px;font-weight:700;font-size:15px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);position:sticky;top:0;background:inherit;border-radius:12px 12px 0 0;z-index:2;}
.lane.heute-lane .lane-header{background:var(--heute-bg);}
.lane-body{padding:8px;overflow-y:auto;flex:1;}
.btn-add-card{background:var(--primary);color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:13px;cursor:pointer;}
.btn-add-card:hover{background:var(--primary-hover);}
/* CARD */
.card{background:var(--card-bg);border-radius:8px;padding:10px 12px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);position:relative;}
.card-top{display:flex;align-items:center;gap:6px;font-size:14px;}
.status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.status-dot.gray{background:var(--dot-gray);}
.status-dot.red{background:var(--dot-red);}
.status-dot.yellow{background:var(--dot-yellow);}
.status-dot.green{background:var(--dot-green);}
.card-prefix{font-weight:600;color:#6366f1;white-space:nowrap;}
.card-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.card-actions{display:flex;gap:2px;margin-left:auto;flex-shrink:0;}
.card-actions button{background:none;border:none;cursor:pointer;font-size:13px;padding:2px 4px;border-radius:4px;opacity:.7;}
.card-actions button:hover{opacity:1;background:#e2e8f0;}
.card-date{font-size:12px;color:#64748b;margin-top:4px;padding-left:16px;}
/* ARCHIVE */
.archive-section{border-top:1px solid var(--border);margin-top:8px;}
.archive-toggle{width:100%;background:none;border:none;padding:8px 12px;text-align:left;font-size:13px;color:#64748b;cursor:pointer;}
.archive-toggle:hover{background:#e2e8f0;}
.archive-body{display:none;padding:4px 8px 8px;}
.archive-body.open{display:block;}
.archive-body .card{opacity:.75;}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;justify-content:center;align-items:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:12px;padding:24px;width:90%;max-width:440px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal h3{margin-bottom:16px;font-size:18px;}
.modal label{display:block;font-size:13px;font-weight:600;margin-bottom:4px;margin-top:12px;color:#475569;}
.modal input,.modal textarea,.modal select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:inherit;}
.modal textarea{min-height:80px;resize:vertical;}
.modal-btns{display:flex;gap:8px;margin-top:20px;justify-content:flex-end;}
.modal-btns button{padding:8px 18px;border-radius:6px;border:none;font-size:14px;cursor:pointer;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-hover);}
.btn-cancel{background:#e2e8f0;color:#475569;}
.btn-cancel:hover{background:#cbd5e1;}
.btn-danger{background:var(--danger);color:#fff;}
.btn-danger:hover{background:#dc2626;}
/* STATUS SELECTOR */
.status-selector{display:flex;gap:12px;margin-top:4px;}
.status-option{display:flex;align-items:center;gap:4px;cursor:pointer;padding:4px 8px;border-radius:6px;border:2px solid transparent;font-size:13px;}
.status-option.selected{border-color:var(--primary);background:#eef2ff;}
.status-option .dot{width:14px;height:14px;border-radius:50%;display:inline-block;}
/* HEUTE TAB / TAGESPLAN */
#tab-heute{padding:16px;overflow-y:auto;}
#tab-heute .heute-cards{max-width:650px;margin:0 auto;}
.tp-header{margin-bottom:20px;}
.tp-date{font-size:22px;font-weight:700;margin-bottom:4px;}
.tp-summary{font-size:14px;color:#64748b;}
.tp-card{background:var(--card-bg);border-radius:10px;padding:12px 14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);display:flex;align-items:flex-start;gap:12px;cursor:pointer;transition:box-shadow .15s;}
.tp-card:hover{box-shadow:0 3px 12px rgba(0,0,0,.12);}
.tp-card.done{opacity:.7;}
.tp-checkbox{flex-shrink:0;width:24px;height:24px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;margin-top:2px;transition:.15s;font-size:14px;background:#fff;}
.tp-checkbox:hover{border-color:var(--primary);background:#eef2ff;}
.tp-checkbox.checked{background:var(--dot-green);border-color:var(--dot-green);color:#fff;}
.tp-body{flex:1;min-width:0;}
.tp-title-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.tp-title{font-weight:600;font-size:15px;}
.tp-title.strikethrough{text-decoration:line-through;color:#94a3b8;}
.tp-lane-badge{font-size:11px;padding:2px 8px;border-radius:10px;color:#fff;white-space:nowrap;font-weight:500;}
.tp-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-left:auto;}
.tp-deadline{font-size:12px;color:#64748b;margin-top:4px;}
.tp-deadline.overdue{color:var(--danger);font-weight:600;}
.tp-desc{font-size:13px;color:#64748b;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tp-footer{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;}
.tp-footer button{padding:10px 18px;border-radius:8px;border:none;font-size:14px;cursor:pointer;font-weight:500;}
.tp-btn-back{background:#e2e8f0;color:#475569;}
.tp-btn-back:hover{background:#cbd5e1;}
.tp-btn-add{background:var(--primary);color:#fff;}
.tp-btn-add:hover{background:var(--primary-hover);}
.tp-empty{text-align:center;padding:48px 16px;}
.tp-empty p{color:#94a3b8;font-size:15px;margin-bottom:16px;}
.tp-empty button{background:var(--primary);color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:14px;cursor:pointer;}
.tp-empty button:hover{background:var(--primary-hover);}
/* TAGEBUCH TAB */
#tab-tagebuch{padding:16px;}
#tab-tagebuch .tb-container{max-width:600px;margin:0 auto;}
#tab-tagebuch h2{font-size:20px;margin-bottom:4px;}
#tab-tagebuch .tb-nav{display:flex;gap:8px;align-items:center;margin-bottom:12px;}
#tab-tagebuch .tb-nav button{background:var(--primary);color:#fff;border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:13px;}
#tab-tagebuch textarea{width:100%;min-height:300px;padding:12px;border:1px solid var(--border);border-radius:8px;font-size:15px;font-family:inherit;resize:vertical;}
/* PATIENTEN TAB */
#tab-patienten{padding:16px;}
#tab-patienten .pat-container{max-width:600px;margin:0 auto;}
#tab-patienten h2{margin-bottom:12px;font-size:20px;}
.pat-item{background:var(--card-bg);border-radius:8px;padding:12px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);display:flex;justify-content:space-between;align-items:center;}
.pat-item .pat-info{flex:1;}
.pat-item .pat-name{font-weight:600;}
.pat-item .pat-notes{font-size:13px;color:#64748b;margin-top:2px;}
.pat-actions button{background:none;border:none;cursor:pointer;font-size:16px;padding:4px;opacity:.7;}
.pat-actions button:hover{opacity:1;}
/* EINSTELLUNGEN */
#tab-einstellungen{padding:16px;}
#tab-einstellungen .settings-container{max-width:500px;margin:0 auto;}
#tab-einstellungen h2{margin-bottom:16px;font-size:20px;}
#tab-einstellungen button{display:block;width:100%;padding:12px;margin-bottom:10px;border-radius:8px;font-size:14px;cursor:pointer;border:1px solid var(--border);}
#tab-einstellungen .export-btn{background:var(--primary);color:#fff;border:none;}
#tab-einstellungen .import-btn{background:#fff;}
#tab-einstellungen .delete-btn{background:var(--danger);color:#fff;border:none;}
/* VORLAGEN DROPDOWN */
.vorlagen-wrapper{position:relative;display:inline-block;}
.btn-vorlagen{background:#2563eb;color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;margin-right:4px;}
.btn-vorlagen:hover{background:#1d4ed8;}
.vorlagen-dropdown{display:none;position:absolute;top:100%;right:0;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:50;min-width:260px;padding:4px 0;margin-top:4px;}
.vorlagen-dropdown.open{display:block;}
.vorlagen-dropdown button{display:block;width:100%;text-align:left;background:none;border:none;padding:8px 14px;font-size:13px;cursor:pointer;color:#1e293b;}
.vorlagen-dropdown button:hover{background:#f1f5f9;}
.vorlagen-dropdown button .vt-label{font-weight:600;display:block;}
.vorlagen-dropdown button .vt-sub{font-size:11px;color:#64748b;display:block;margin-top:1px;}
/* MOBILE */
@media(max-width:768px){
  .lanes-container{gap:0;padding:0;overflow:hidden;position:relative;}
  .lane{min-width:calc(100vw - 16px);max-width:calc(100vw - 16px);margin:0 8px;flex-shrink:0;max-height:calc(100vh - 110px);}
  .mobile-lane-nav{display:flex;align-items:center;justify-content:center;gap:8px;padding:8px;background:var(--bg);position:sticky;top:0;z-index:10;}
  .mobile-lane-nav button{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 12px;cursor:pointer;font-size:18px;}
  .mobile-lane-nav span{font-size:14px;font-weight:600;min-width:120px;text-align:center;}
  .lane-dots{display:flex;gap:4px;justify-content:center;padding-bottom:4px;}
  .lane-dots .dot{width:8px;height:8px;border-radius:50%;background:#cbd5e1;}
  .lane-dots .dot.active{background:var(--primary);}
}
@media(min-width:769px){
  .mobile-lane-nav,.lane-dots{display:none;}
}
</style>
</head>
<body>
<nav class="nav" id="mainNav">
  <button data-tab="heute" class="active">Heute</button>
  <button data-tab="projekte">Projekte</button>
  <button data-tab="tagebuch">Tagebuch</button>
  <button data-tab="patienten">Patienten</button>
  <button data-tab="einstellungen">Einstellungen</button>
</nav>

<div class="tab active" id="tab-heute">
  <div class="heute-cards" id="tagesplanContainer"></div>
</div>

<div class="tab" id="tab-projekte">
  <div class="mobile-lane-nav" id="mobileLaneNav">
    <button id="lanePrev">?</button>
    <span id="laneNameDisplay"></span>
    <button id="laneNext">?</button>
  </div>
  <div class="lane-dots" id="laneDots"></div>
  <div class="lanes-container" id="lanesContainer"></div>
</div>

<div class="tab" id="tab-tagebuch">
  <div class="tb-container">
    <div class="tb-nav">
      <button id="tbPrev">← Vorheriger Tag</button>
      <span id="tbDate"></span>
      <button id="tbNext">Nächster Tag →</button>
    </div>
    <h2 id="tbHeading"></h2>
    <textarea id="tbText" placeholder="Tagebucheintrag für heute..."></textarea>
  </div>
</div>

<div class="tab" id="tab-patienten">
  <div class="pat-container">
    <h2>Patienten</h2>
    <button class="btn-add-card" id="addPatient" style="margin-bottom:12px;">+ Patient hinzufügen</button>
    <div id="patList"></div>
  </div>
</div>

<div class="tab" id="tab-einstellungen">
  <div class="settings-container">
    <h2>Einstellungen</h2>
    <p style="margin-bottom:16px;color:#64748b;">CoworkDashboard</p>
    <button class="export-btn" id="exportBtn">Daten exportieren</button>
    <button class="import-btn" id="importBtn">Daten importieren</button>
    <input type="file" id="importFile" accept=".json" style="display:none;">
    <button class="delete-btn" id="deleteBtn">Alle Daten löschen</button>
  </div>
</div>

<!-- Create Card Modal -->
<div class="modal-overlay" id="createModal">
  <div class="modal">
    <h3 id="createModalTitle">Neue Karte</h3>
    <label>Präfix</label>
    <input type="text" id="cmPrefix" maxlength="6">
    <label>Überschrift *</label>
    <input type="text" id="cmTitle" required>
    <label>Status</label>
    <div class="status-selector" id="cmStatus">
      <div class="status-option selected" data-val="gray"><span class="dot" style="background:var(--dot-gray)"></span>grau</div>
      <div class="status-option" data-val="red"><span class="dot" style="background:var(--dot-red)"></span>rot</div>
      <div class="status-option" data-val="yellow"><span class="dot" style="background:var(--dot-yellow)"></span>gelb</div>
      <div class="status-option" data-val="green"><span class="dot" style="background:var(--dot-green)"></span>grün</div>
    </div>
    <label>Deadline</label>
    <input type="date" id="cmDeadline">
    <label>Beschreibung</label>
    <textarea id="cmDesc"></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" id="cmCancel">Abbrechen</button>
      <button class="btn-primary" id="cmSave">Erstellen</button>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <h3 id="dmTitle"></h3>
    <p id="dmStatus" style="margin:8px 0;"></p>
    <p id="dmDeadline" style="font-size:14px;color:#64748b;"></p>
    <p id="dmDesc" style="margin-top:12px;white-space:pre-wrap;"></p>
    <div class="modal-btns"><button class="btn-cancel" id="dmClose">Schließen</button></div>
  </div>
</div>

<!-- Patient Modal -->
<div class="modal-overlay" id="patModal">
  <div class="modal">
    <h3 id="patModalTitle">Neuer Patient</h3>
    <label>Name *</label>
    <input type="text" id="pmName">
    <label>Notizen</label>
    <textarea id="pmNotes"></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" id="pmCancel">Abbrechen</button>
      <button class="btn-primary" id="pmSave">Speichern</button>
    </div>
  </div>
</div>

<script>
(function(){
  const LANES = [
    {id:'heute',name:'📌 Heute',prefix:'HE',special:true},
    {id:'barmelweid',name:'Barmelweid',prefix:'BA'},
    {id:'patienten_lane',name:'Patienten',prefix:'PA'},
    {id:'psp_wb',name:'PSP WB',prefix:'WB'},
    {id:'selfimprovement',name:'SelfImprovement',prefix:'SI'},
    {id:'finanzen',name:'Finanzen',prefix:'FI'},
    {id:'freunde',name:'Freunde',prefix:'FR'},
    {id:'events',name:'Events',prefix:'EV'},
    {id:'familie',name:'Familie',prefix:'FA'},
    {id:'ki',name:'KI',prefix:'KI'},
    {id:'cowork',name:'Cowork',prefix:'CO'},
    {id:'imperialk',name:'ImperialKI',prefix:'IK'},
    {id:'erinnerungen',name:'Erinnerungen',prefix:'ER'},
    {id:'tagebuch_lane',name:'Tagebuch',prefix:'TA'}
  ];

  // Lane color mapping for badges
  const LANE_COLORS = {
    barmelweid:'#2563eb',patienten_lane:'#0891b2',psp_wb:'#7c3aed',
    selfimprovement:'#059669',finanzen:'#d97706',freunde:'#e11d48',
    events:'#8b5cf6',familie:'#ea580c',ki:'#0284c7',cowork:'#6366f1',
    imperialk:'#4f46e5',erinnerungen:'#64748b',tagebuch_lane:'#475569',
    heute:'#7c3aed'
  };

  const STORAGE_KEY = 'coworkdashboard_data';
  let data;
  let currentLaneIdx = 0;
  let currentCreateLane = null;
  let editingPatient = null;
  let tbDate;

  function loadData(){
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){try{data=JSON.parse(raw);}catch(e){data=null;}}
    if(!data) data = {cards:{},cardCounters:{},tagebuch:{},patienten:[]};
    if(!data.cards) data.cards={};
    if(!data.cardCounters) data.cardCounters={};
    if(!data.tagebuch) data.tagebuch={};
    if(!data.patienten) data.patienten=[];
    LANES.forEach(l=>{if(!data.cardCounters[l.prefix]) data.cardCounters[l.prefix]=0;});
  }
  function saveData(){localStorage.setItem(STORAGE_KEY,JSON.stringify(data));}

  function formatDate(d){
    if(!d) return '';
    const p=d.split('-');
    return p[2]+'.'+p[1]+'.'+p[0];
  }
  function todayStr(){return new Date().toISOString().slice(0,10);}
  function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

  function getLaneName(laneId){
    const l=LANES.find(x=>x.id===laneId);
    return l?l.name:laneId;
  }
  function getLaneColor(laneId){
    return LANE_COLORS[laneId]||'#64748b';
  }

  // NAV
  function switchTab(tabName){
    document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
    document.querySelector('.nav button[data-tab="'+tabName+'"]').classList.add('active');
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.getElementById('tab-'+tabName).classList.add('active');
    if(tabName==='heute') renderHeute();
    if(tabName==='projekte') renderLanes();
    if(tabName==='tagebuch') renderTagebuch();
    if(tabName==='patienten') renderPatienten();
  }
  document.querySelectorAll('.nav button').forEach(btn=>{
    btn.addEventListener('click',()=>switchTab(btn.dataset.tab));
  });

  // LANES
  function renderLanes(){
    const container = document.getElementById('lanesContainer');
    container.innerHTML='';
    LANES.forEach((lane,idx)=>{
      const el = document.createElement('div');
      el.className='lane'+(lane.special?' heute-lane':'');
      const cards = Object.values(data.cards).filter(c=>{
        if(lane.id==='heute') return c.inHeute && !c.archived;
        return c.lane===lane.id && !c.inHeute && !c.archived;
      });
      const archived = Object.values(data.cards).filter(c=>{
        if(lane.id==='heute') return c.inHeute && c.archived;
        return c.lane===lane.id && !c.inHeute && c.archived;
      });
      const vorlagenBtn = lane.id==='barmelweid' ? `
          <div class="vorlagen-wrapper">
            <button class="btn-vorlagen" data-lane="${lane.id}">Vorlagen ▾</button>
            <div class="vorlagen-dropdown" id="vorlagenDrop">
              ${BA_TEMPLATES.map((t,i)=>`<button data-tpl="${i}"><span class="vt-label">${t.title}</span><span class="vt-sub">${t.label}</span></button>`).join('')}
            </div>
          </div>` : '';
      el.innerHTML=`
        <div class="lane-header">
          <span>${lane.name}</span>
          <div style="display:flex;align-items:center;gap:4px;">
            ${vorlagenBtn}
            <button class="btn-add-card" data-lane="${lane.id}">+ Karte</button>
          </div>
        </div>
        <div class="lane-body">
          <div class="lane-cards" data-lane="${lane.id}"></div>
          ${archived.length||cards.length>=0?`
          <div class="archive-section">
            <button class="archive-toggle" data-lane="${lane.id}">Archiv (${archived.length}) ▶</button>
            <div class="archive-body" data-lane="${lane.id}"></div>
          </div>`:''}
        </div>`;
      container.appendChild(el);
      const cardsDiv=el.querySelector('.lane-cards');
      cards.forEach(c=>cardsDiv.appendChild(createCardEl(c,lane.id==='heute')));
      const archBody=el.querySelector('.archive-body');
      if(archBody) archived.forEach(c=>{
        const ce=createCardEl(c,lane.id==='heute',true);
        archBody.appendChild(ce);
      });
    });
    // events
    document.querySelectorAll('.btn-add-card').forEach(b=>{
      b.addEventListener('click',()=>openCreateModal(b.dataset.lane));
    });
    // Vorlagen dropdown
    document.querySelectorAll('.btn-vorlagen').forEach(b=>{
      b.addEventListener('click',(e)=>{
        e.stopPropagation();
        const drop=b.nextElementSibling;
        drop.classList.toggle('open');
      });
    });
    document.querySelectorAll('.vorlagen-dropdown button').forEach(b=>{
      b.addEventListener('click',(e)=>{
        e.stopPropagation();
        const idx=parseInt(b.dataset.tpl);
        b.closest('.vorlagen-dropdown').classList.remove('open');
        openTemplateCard(idx);
      });
    });
    // Close dropdown on outside click
    document.addEventListener('click',()=>{
      document.querySelectorAll('.vorlagen-dropdown.open').forEach(d=>d.classList.remove('open'));
    });
    document.querySelectorAll('.archive-toggle').forEach(b=>{
      b.addEventListener('click',()=>{
        const body=b.nextElementSibling;
        body.classList.toggle('open');
        b.textContent=body.classList.contains('open')
          ? b.textContent.replace('?','')
          : b.textContent.replace('','?');
      });
    });
    updateMobileLaneNav();
  }

  function createCardEl(card, isHeuteLane, isArchived){
    const div=document.createElement('div');
    div.className='card';
    const hasDesc=card.description&&card.description.trim();
    let actions='';
    if(!isArchived){
      if(hasDesc) actions+=`<button class="btn-detail" data-id="${card.id}" title="Details">...</button>`;
      if(!isHeuteLane) actions+=`<button class="btn-to-heute" data-id="${card.id}" title="Zu Heute">→</button>`;
      if(isHeuteLane) actions+=`<button class="btn-from-heute" data-id="${card.id}" title="Zurück">←</button>`;
      actions+=`<button class="btn-archive" data-id="${card.id}" title="Archivieren">📥</button>`;
      actions+=`<button class="btn-delete" data-id="${card.id}" title="Löschen">🗑</button>`;
    } else {
      actions+=`<button class="btn-unarchive" data-id="${card.id}" title="Reaktivieren">reaktivieren</button>`;
      actions+=`<button class="btn-delete" data-id="${card.id}" title="Löschen">🗑</button>`;
    }
    div.innerHTML=`
      <div class="card-top">
        <span class="status-dot ${card.status}"></span>
        <span class="card-prefix">${card.id}</span>
        <span class="card-title">· ${esc(card.title)}</span>
        <div class="card-actions">${actions}</div>
      </div>
      ${card.deadline?`<div class="card-date">📅 ${formatDate(card.deadline)}</div>`:''}`;
    // events
    div.querySelector('.btn-detail')?.addEventListener('click',()=>openDetail(card));
    div.querySelector('.btn-to-heute')?.addEventListener('click',()=>{moveToHeute(card.id);});
    div.querySelector('.btn-from-heute')?.addEventListener('click',()=>{moveFromHeute(card.id);});
    div.querySelector('.btn-archive')?.addEventListener('click',()=>{archiveCard(card.id);});
    div.querySelector('.btn-unarchive')?.addEventListener('click',()=>{unarchiveCard(card.id);});
    div.querySelector('.btn-delete')?.addEventListener('click',()=>{deleteCard(card.id);});
    return div;
  }

  function moveToHeute(id){
    const c=data.cards[id];
    if(!c) return;
    c.originalLane=c.lane;
    c.inHeute=true;
    saveData();renderLanes();
  }
  function moveFromHeute(id){
    const c=data.cards[id];
    if(!c) return;
    c.inHeute=false;
    if(c.originalLane) c.lane=c.originalLane;
    c.originalLane=null;
    saveData();renderLanes();renderHeute();
  }
  function archiveCard(id){data.cards[id].archived=true;saveData();renderLanes();renderHeute();}
  function unarchiveCard(id){data.cards[id].archived=false;saveData();renderLanes();renderHeute();}
  function deleteCard(id){
    if(!confirm('Karte "'+id+'" wirklich löschen?')) return;
    delete data.cards[id];saveData();renderLanes();renderHeute();
  }

  // BARMELWEID VORLAGEN
  const BA_TEMPLATES = [
    {title:'Verlaufsbericht-Gerüst',desc:'Strukturvorlage für Verlaufsberichte nach SGPP-Standard.\n\nBitte erstelle ein Verlaufsbericht-Gerüst mit folgenden Abschnitten:\n1. Aktueller Zustand\n2. Therapieverlauf seit letztem Bericht\n3. Medikation\n4. Diagnosen (ICD-10)\n5. Zielerreichung\n6. Weiteres Vorgehen\n\n[Stichpunkte hier einfügen]',status:'gray',label:'~30 min/Woche gespart'},
    {title:'Erstgespräch-Dokumentation',desc:'Post-Gespräch-Dokumentationsvorlage.\n\nBitte dokumentiere das Erstgespräch in 5 Phasen:\n1. Anamnese (biographisch, sozial, medizinisch)\n2. Problemdefinition & Leidensdruck\n3. Ressourcen & Stärken\n4. Therapieziele (SMART formuliert)\n5. Nächste Schritte & Behandlungsplanung\n\n[Notizen hier einfügen]',status:'gray',label:'~20 min/Gespräch gespart'},
    {title:'Austrittsbericht',desc:'Struktur für Austrittsberichte mit allen Pflichtfeldern.\n\nBitte erstelle einen Austrittsbericht mit:\n1. Eintrittsdatum & Austrittsdatum\n2. Diagnosen (Haupt- und Nebendiagnosen, ICD-10)\n3. Therapieverlauf & Interventionen\n4. Zielerreichung & Outcome\n5. Empfehlungen & Nachsorgeplan\n6. Medikation bei Austritt\n\n[Stichpunkte hier einfügen]',status:'gray',label:'~45 min/Austritt gespart'},
    {title:'Gesprächsvorbereitung',desc:'Checkliste & Leitfragen für nächstes Gespräch.\n\nBitte erstelle eine Gesprächsvorbereitung:\n1. Zusammenfassung letzter Verlaufseintrag\n2. Offene Themen / Homework-Review\n3. Leitfragen für heute\n4. Interventionsideen\n5. Zeitplanung der Sitzung\n\n[Letzter Verlaufseintrag / Notizen hier einfügen]',status:'gray',label:'~10 min/Gespräch gespart'},
    {title:'Tages-Briefing',desc:'Morgenroutine: Struktur für den Tag.\n\nBitte erstelle mein Tages-Briefing:\n1. Was liegt heute an? (Termine, Gespräche, Admin)\n2. Energie-Check (1-10)\n3. Top 3 Prioritäten\n4. Vorbereitungen nötig?\n5. Tagesabschluss-Ritual planen\n\n[Heutige Termine / Notizen hier einfügen]',status:'gray',label:'~15 min/Tag gespart'},
    {title:'Supervision-Vorbereitung',desc:'Falldarstellung für Supervision strukturieren.\n\nBitte strukturiere meine Supervisionsvorbereitung:\n1. Fallvignette (pseudonymisiert)\n2. Kernthemen & Dynamiken\n3. Eigene Hypothesen\n4. Gegenübertragung / eigene Reaktionen\n5. Konkrete Fragen an Supervisor:in\n\n[Notizen hier einfügen]',status:'gray',label:'~30 min/Supervision gespart'},
    {title:'Überweisungsbrief',desc:'Standard-Überweisungsbrief mit Pflichtangaben.\n\nBitte erstelle einen Überweisungsbrief mit:\n1. Absender (Klinik Barmelweid)\n2. Empfänger\n3. Patient (pseudonymisiert)\n4. Diagnosen\n5. Bisherige Behandlung\n6. Fragestellung / Grund der Überweisung\n7. Relevante Befunde\n\n[Angaben hier einfügen]',status:'gray',label:'~20 min/Brief gespart'},
    {title:'Interne Kommunikation',desc:'Templates für häufige interne Mitteilungen.\n\nBitte erstelle eine interne Mitteilung:\nTyp: [Krankenmeldung / Anfrage / Bericht / Info]\n\n1. An: [Empfänger/Abteilung]\n2. Betreff:\n3. Inhalt:\n4. Gewünschte Aktion / Frist:\n\n[Details hier einfügen]',status:'gray',label:'~10 min/Brief gespart'}
  ];

  function openTemplateCard(tplIdx){
    const tpl = BA_TEMPLATES[tplIdx];
    openCreateModal('barmelweid');
    document.getElementById('cmTitle').value = tpl.title;
    document.getElementById('cmDesc').value = tpl.desc;
    // Set status
    document.querySelectorAll('#cmStatus .status-option').forEach(o=>o.classList.remove('selected'));
    document.querySelector('#cmStatus .status-option[data-val="'+tpl.status+'"]').classList.add('selected');
  }

  // CREATE MODAL
  function openCreateModal(laneId){
    currentCreateLane=laneId;
    const lane=LANES.find(l=>l.id===laneId);
    const nextNum=data.cardCounters[lane.prefix]+1;
    document.getElementById('createModalTitle').textContent='Neue Karte';
    document.getElementById('cmPrefix').value=lane.prefix+String(nextNum).padStart(3,'0');
    document.getElementById('cmTitle').value='';
    document.getElementById('cmDeadline').value='';
    document.getElementById('cmDesc').value='';
    document.querySelectorAll('#cmStatus .status-option').forEach(o=>o.classList.remove('selected'));
    document.querySelector('#cmStatus .status-option[data-val="gray"]').classList.add('selected');
    document.getElementById('createModal').classList.add('open');
  }
  document.getElementById('cmCancel').addEventListener('click',()=>document.getElementById('createModal').classList.remove('open'));
  document.querySelectorAll('#cmStatus .status-option').forEach(o=>{
    o.addEventListener('click',()=>{
      document.querySelectorAll('#cmStatus .status-option').forEach(x=>x.classList.remove('selected'));
      o.classList.add('selected');
    });
  });
  document.getElementById('cmSave').addEventListener('click',()=>{
    const prefix=document.getElementById('cmPrefix').value.trim();
    const title=document.getElementById('cmTitle').value.trim();
    if(!title){alert('Überschrift ist erforderlich.');return;}
    if(!prefix){alert('Präfix ist erforderlich.');return;}
    if(data.cards[prefix]){alert('Karte mit diesem Präfix existiert bereits.');return;}
    const status=document.querySelector('#cmStatus .status-option.selected').dataset.val;
    const deadline=document.getElementById('cmDeadline').value||null;
    const desc=document.getElementById('cmDesc').value;
    const lane=LANES.find(l=>l.id===currentCreateLane);
    // update counter
    const numPart=parseInt(prefix.replace(/^[A-Z]+/,''),10);
    if(numPart>data.cardCounters[lane.prefix]) data.cardCounters[lane.prefix]=numPart;
    data.cards[prefix]={
      id:prefix,lane:currentCreateLane,originalLane:null,
      title:title,status:status,deadline:deadline,
      description:desc,archived:false,
      inHeute:currentCreateLane==='heute',
      createdAt:new Date().toISOString()
    };
    saveData();
    document.getElementById('createModal').classList.remove('open');
    renderLanes();renderHeute();
  });
  document.getElementById('createModal').addEventListener('click',e=>{
    if(e.target===document.getElementById('createModal')) document.getElementById('createModal').classList.remove('open');
  });

  // DETAIL MODAL
  function openDetail(card){
    document.getElementById('dmTitle').textContent=card.id+' · '+card.title;
    const statusMap={gray:'⚪ grau',red:'🔴 rot',yellow:'🟡 gelb',green:'🟢 grün'};
    document.getElementById('dmStatus').textContent='Status: '+(statusMap[card.status]||card.status);
    document.getElementById('dmDeadline').textContent=card.deadline?'Deadline: '+formatDate(card.deadline):'';
    document.getElementById('dmDesc').textContent=card.description||'Keine Beschreibung.';
    document.getElementById('detailModal').classList.add('open');
  }
  document.getElementById('dmClose').addEventListener('click',()=>document.getElementById('detailModal').classList.remove('open'));
  document.getElementById('detailModal').addEventListener('click',e=>{
    if(e.target===document.getElementById('detailModal')) document.getElementById('detailModal').classList.remove('open');
  });

  // HEUTE TAB - TAGESPLAN
  function renderHeute(){
    const container=document.getElementById('tagesplanContainer');
    const cards=Object.values(data.cards).filter(c=>c.inHeute&&!c.archived);
    const doneCount=cards.filter(c=>c.status==='green').length;
    const openCount=cards.length-doneCount;
    const dateStr=new Date().toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'});

    if(cards.length===0){
      container.innerHTML=`
        <div class="tp-empty">
          <p style="font-size:40px;margin-bottom:12px;">📋</p>
          <p>Kein Plan für heute — zieh Aufgaben aus dem Kanban in die Heute-Lane</p>
          <button id="tpGoKanban">→ Zum Kanban</button>
        </div>`;
      document.getElementById('tpGoKanban').addEventListener('click',()=>switchTab('projekte'));
      return;
    }

    let html=`
      <div class="tp-header">
        <div class="tp-date">${dateStr}</div>
        <div class="tp-summary">${cards.length} Aufgabe${cards.length!==1?'n':''} heute · ${openCount} offen · ${doneCount} erledigt</div>
      </div>
      <div id="tpCardList"></div>
      <div class="tp-footer">
        <button class="tp-btn-back" id="tpBackAll">← Alles zurückschieben</button>
        <button class="tp-btn-add" id="tpAddNew">+ Neue Aufgabe heute</button>
      </div>`;
    container.innerHTML=html;

    const listEl=document.getElementById('tpCardList');
    cards.forEach(card=>{
      const isDone=card.status==='green';
      const originLane=card.originalLane||card.lane;
      const laneName=getLaneName(originLane);
      const laneColor=getLaneColor(originLane);
      const isOverdue=card.deadline&&card.deadline<todayStr()&&!isDone;
      const descSnippet=card.description?(card.description.length>80?card.description.substring(0,80)+'.':card.description):'';

      const el=document.createElement('div');
      el.className='tp-card'+(isDone?' done':'');
      el.innerHTML=`
        <div class="tp-checkbox${isDone?' checked':''}" data-id="${card.id}">${isDone?'V':''}</div>
        <div class="tp-body">
          <div class="tp-title-row">
            <span class="tp-title${isDone?' strikethrough':''}">${esc(card.id)} · ${esc(card.title)}</span>
            ${originLane&&originLane!=='heute'?`<span class="tp-lane-badge" style="background:${laneColor}">aus ${esc(laneName.replace(/📌\s*/,''))}</span>`:''}
            <span class="tp-dot status-dot ${card.status}"></span>
          </div>
          ${card.deadline?`<div class="tp-deadline${isOverdue?' overdue':''}">📅 ${formatDate(card.deadline)}${isOverdue?'— überfällig':''}</div>`:''}
          ${descSnippet?`<div class="tp-desc">${esc(descSnippet)}</div>`:''}
        </div>`;

      // Checkbox click - toggle done
      el.querySelector('.tp-checkbox').addEventListener('click',(e)=>{
        e.stopPropagation();
        const c=data.cards[card.id];
        if(!c) return;
        if(c.status==='green'){
          c.status='gray';
        } else {
          c.status='green';
        }
        saveData();renderHeute();
      });

      // Card body click - open detail modal
      el.querySelector('.tp-body').addEventListener('click',()=>openDetail(card));

      listEl.appendChild(el);
    });

    // Back all button
    document.getElementById('tpBackAll').addEventListener('click',()=>{
      const heuteCards=Object.values(data.cards).filter(c=>c.inHeute&&!c.archived);
      if(!heuteCards.length) return;
      if(!confirm(heuteCards.length+' Karte'+(heuteCards.length!==1?'n':'')+' zurückschieben?')) return;
      heuteCards.forEach(c=>{
        c.inHeute=false;
        if(c.originalLane){
          c.lane=c.originalLane;
          c.originalLane=null;
        } else {
          // Move to first non-heute lane if no originalLane
          const firstLane=LANES.find(l=>l.id!=='heute');
          if(firstLane) c.lane=firstLane.id;
        }
      });
      saveData();renderHeute();renderLanes();
    });

    // Add new card button
    document.getElementById('tpAddNew').addEventListener('click',()=>{
      openCreateModal('heute');
    });
  }

  // TAGEBUCH
  function renderTagebuch(){
    if(!tbDate) tbDate=todayStr();
    document.getElementById('tbDate').textContent=formatDate(tbDate);
    document.getElementById('tbHeading').textContent='Tagebuch - '+formatDate(tbDate);
    document.getElementById('tbText').value=data.tagebuch[tbDate]||'';
  }
  document.getElementById('tbText').addEventListener('input',()=>{
    data.tagebuch[tbDate]=document.getElementById('tbText').value;
    saveData();
  });
  document.getElementById('tbPrev').addEventListener('click',()=>{
    const d=new Date(tbDate);d.setDate(d.getDate()-1);
    tbDate=d.toISOString().slice(0,10);renderTagebuch();
  });
  document.getElementById('tbNext').addEventListener('click',()=>{
    const d=new Date(tbDate);d.setDate(d.getDate()+1);
    tbDate=d.toISOString().slice(0,10);renderTagebuch();
  });

  // PATIENTEN
  function renderPatienten(){
    const list=document.getElementById('patList');
    list.innerHTML='';
    data.patienten.forEach((p,i)=>{
      const div=document.createElement('div');
      div.className='pat-item';
      div.innerHTML=`<div class="pat-info"><div class="pat-name">${esc(p.name)}</div>${p.notes?'<div class="pat-notes">'+esc(p.notes)+'</div>':''}</div>
        <div class="pat-actions"><button class="pat-edit" data-idx="${i}">✏️</button><button class="pat-del" data-idx="${i}">🗑</button></div>`;
      div.querySelector('.pat-edit').addEventListener('click',()=>openPatModal(i));
      div.querySelector('.pat-del').addEventListener('click',()=>{
        if(!confirm('Patient "'+p.name+'" löschen?')) return;
        data.patienten.splice(i,1);saveData();renderPatienten();
      });
      list.appendChild(div);
    });
  }
  document.getElementById('addPatient').addEventListener('click',()=>openPatModal(null));
  function openPatModal(idx){
    editingPatient=idx;
    document.getElementById('patModalTitle').textContent=idx===null?'Neuer Patient':'Patient bearbeiten';
    document.getElementById('pmName').value=idx!==null?data.patienten[idx].name:'';
    document.getElementById('pmNotes').value=idx!==null?(data.patienten[idx].notes||''):'';
    document.getElementById('patModal').classList.add('open');
  }
  document.getElementById('pmCancel').addEventListener('click',()=>document.getElementById('patModal').classList.remove('open'));
  document.getElementById('pmSave').addEventListener('click',()=>{
    const name=document.getElementById('pmName').value.trim();
    if(!name){alert('Name ist erforderlich.');return;}
    const notes=document.getElementById('pmNotes').value.trim();
    if(editingPatient!==null){
      data.patienten[editingPatient].name=name;
      data.patienten[editingPatient].notes=notes;
    } else {
      data.patienten.push({id:Date.now().toString(),name:name,notes:notes});
    }
    saveData();
    document.getElementById('patModal').classList.remove('open');
    renderPatienten();
  });
  document.getElementById('patModal').addEventListener('click',e=>{
    if(e.target===document.getElementById('patModal')) document.getElementById('patModal').classList.remove('open');
  });

  // EINSTELLUNGEN
  document.getElementById('exportBtn').addEventListener('click',()=>{
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='coworkdashboard_export_'+todayStr()+'.json';a.click();
  });
  document.getElementById('importBtn').addEventListener('click',()=>document.getElementById('importFile').click());
  document.getElementById('importFile').addEventListener('change',e=>{
    const file=e.target.files[0];if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const imported=JSON.parse(ev.target.result);
        data=imported;saveData();
        alert('Daten erfolgreich importiert.');
        renderLanes();renderHeute();renderPatienten();
      }catch(err){alert('Fehler beim Importieren: '+err.message);}
    };
    reader.readAsText(file);
    e.target.value='';
  });
  document.getElementById('deleteBtn').addEventListener('click',()=>{
    if(!confirm('Wirklich ALLE Daten löschen? Dies kann nicht rückgängig gemacht werden.')) return;
    localStorage.removeItem(STORAGE_KEY);
    loadData();renderLanes();renderHeute();renderPatienten();renderTagebuch();
    alert('Alle Daten gelöscht.');
  });

  // MOBILE SWIPE
  let touchStartX=0,touchEndX=0;
  const lc=document.getElementById('lanesContainer');
  lc.addEventListener('touchstart',e=>{touchStartX=e.changedTouches[0].screenX;},{passive:true});
  lc.addEventListener('touchend',e=>{
    touchEndX=e.changedTouches[0].screenX;
    if(window.innerWidth>768) return;
    const diff=touchStartX-touchEndX;
    if(Math.abs(diff)>50){
      if(diff>0 && currentLaneIdx<LANES.length-1) currentLaneIdx++;
      else if(diff<0 && currentLaneIdx>0) currentLaneIdx--;
      scrollToLane(currentLaneIdx);
    }
  },{passive:true});

  function scrollToLane(idx){
    currentLaneIdx=idx;
    const lanes=lc.querySelectorAll('.lane');
    if(lanes[idx]) lanes[idx].scrollIntoView({behavior:'smooth',inline:'start',block:'nearest'});
    updateMobileLaneNav();
  }
  function updateMobileLaneNav(){
    document.getElementById('laneNameDisplay').textContent=LANES[currentLaneIdx].name;
    // dots
    const dotsEl=document.getElementById('laneDots');
    dotsEl.innerHTML='';
    LANES.forEach((_,i)=>{
      const d=document.createElement('span');
      d.className='dot'+(i===currentLaneIdx?' active':'');
      d.addEventListener('click',()=>scrollToLane(i));
      dotsEl.appendChild(d);
    });
  }
  document.getElementById('lanePrev').addEventListener('click',()=>{
    if(currentLaneIdx>0) scrollToLane(currentLaneIdx-1);
  });
  document.getElementById('laneNext').addEventListener('click',()=>{
    if(currentLaneIdx<LANES.length-1) scrollToLane(currentLaneIdx+1);
  });

  // INIT
  loadData();
  tbDate=todayStr();
  renderHeute();
  renderTagebuch();
  renderPatienten();
  // Render lanes when projekte tab is shown
  setTimeout(()=>renderLanes(),0);
})();
</script>
</body>
</html>
