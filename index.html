<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#667eea">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CoworkDashboard">
  <title>CoworkDashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
    :root{
      --glass:rgba(255,255,255,0.68);
      --glass-strong:rgba(255,255,255,0.85);
      --glass-subtle:rgba(255,255,255,0.45);
      --glass-border:rgba(255,255,255,0.6);
      --glass-shadow:0 8px 32px rgba(31,38,135,0.08),0 2px 8px rgba(31,38,135,0.04);
      --blur:blur(24px) saturate(180%);
      --accent:#007AFF;
      --accent-r:rgba(0,122,255,0.12);
      --text:#1c1c1e;
      --text2:#6c6c70;
      --text3:#aeaeb2;
      --sep:rgba(60,60,67,0.1);
      --red:#ff3b30;--green:#34c759;--orange:#ff9500;--purple:#af52de;--teal:#30b0c7;
      --r-sm:10px;--r-md:16px;--r-lg:20px;--r-xl:28px;
    }
    body{
      font-family:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
      background:linear-gradient(135deg,#ddd6fe 0%,#bfdbfe 30%,#a7f3d0 65%,#e9d5ff 100%);
      background-attachment:fixed;
      min-height:100dvh;color:var(--text);overflow:hidden;
    }
    #app{display:flex;height:100dvh;overflow:hidden;position:relative;}

    /* ---- SIDEBAR (desktop only) ---- */
    #sidebar{
      display:none;width:240px;flex-shrink:0;
      background:var(--glass-strong);
      backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
      border-right:1px solid var(--glass-border);
      box-shadow:var(--glass-shadow);
      padding:0 10px 20px;
      flex-direction:column;gap:2px;z-index:50;
    }
    .sidebar-brand{
      font-size:17px;font-weight:800;letter-spacing:-0.4px;
      padding:28px 10px 20px;color:var(--text);
      display:flex;align-items:center;gap:8px;
    }
    .sidebar-brand .brand-icon{
      width:30px;height:30px;border-radius:8px;
      background:linear-gradient(135deg,#667eea,#764ba2);
      display:flex;align-items:center;justify-content:center;font-size:14px;
    }
    .sidebar-section{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);padding:16px 10px 6px;}
    .sidebar-item{
      display:flex;align-items:center;gap:10px;padding:9px 10px;
      border-radius:var(--r-sm);cursor:pointer;color:var(--text2);
      font-size:14px;font-weight:500;transition:all 0.15s;
      border:none;background:none;width:100%;text-align:left;
    }
    .sidebar-item svg{width:17px;height:17px;flex-shrink:0;}
    .sidebar-item:hover{background:rgba(0,0,0,0.04);color:var(--text);}
    .sidebar-item.active{background:var(--accent-r);color:var(--accent);font-weight:600;}
    .sidebar-item.active svg{stroke:var(--accent);}
    .sidebar-spacer{flex:1;}
    .sidebar-footer{padding-top:8px;border-top:1px solid var(--sep);}

    /* ---- MAIN ---- */
    #main-content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
    .tab-content{display:none;flex:1;overflow:hidden;flex-direction:column;}
    .tab-content.active{display:flex;}

    /* ---- BOTTOM NAV (mobile) ---- */
    #bottom-nav{
      display:flex;flex-shrink:0;
      background:var(--glass-strong);
      backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
      border-top:1px solid var(--glass-border);
      padding-bottom:env(safe-area-inset-bottom);
      box-shadow:0 -1px 0 rgba(0,0,0,0.06);
      z-index:100;
    }
    .nav-item{
      flex:1;display:flex;flex-direction:column;align-items:center;
      justify-content:center;padding:8px 4px 6px;gap:3px;
      cursor:pointer;color:var(--text3);font-size:10px;font-weight:600;
      letter-spacing:.02em;transition:color 0.15s;
      border:none;background:none;position:relative;
    }
    .nav-item svg{width:24px;height:24px;transition:transform 0.2s cubic-bezier(.34,1.56,.64,1);}
    .nav-item.active{color:var(--accent);}
    .nav-item.active svg{transform:scale(1.08);}
    .nav-item.active::before{
      content:'';position:absolute;top:0;left:25%;right:25%;
      height:2.5px;background:var(--accent);border-radius:0 0 2px 2px;
    }

    /* ---- PAGE HEADER ---- */
    .page-header{
      background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
      border-bottom:1px solid var(--glass-border);
      padding:max(16px,env(safe-area-inset-top)) 20px 14px;
      flex-shrink:0;
    }

    /* ---- GLASS CARD ---- */
    .glass-card{
      background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
      border:1px solid var(--glass-border);border-radius:var(--r-lg);
      box-shadow:var(--glass-shadow);overflow:hidden;
    }
    .glass-card-sm{
      background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
      border:1px solid var(--glass-border);border-radius:var(--r-md);
      box-shadow:var(--glass-shadow);overflow:hidden;
    }

    /* ---- LABELS ---- */
    .section-label{
      font-size:11px;font-weight:700;text-transform:uppercase;
      letter-spacing:.07em;color:var(--text2);margin-bottom:8px;padding:0 2px;
    }

    /* ---- HOME ---- */
    .home-scroll{
      flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
      padding:16px;display:flex;flex-direction:column;gap:18px;
    }
    /* time grid */
    .time-slot{display:flex;align-items:flex-start;min-height:58px;position:relative;}
    .time-label{width:42px;flex-shrink:0;font-size:11px;color:var(--text3);padding-top:2px;text-align:right;padding-right:10px;font-weight:500;}
    .time-line{flex:1;border-top:1px solid var(--sep);min-height:58px;cursor:pointer;transition:background 0.15s;border-radius:0 8px 8px 0;position:relative;}
    .time-line:hover{background:rgba(0,122,255,0.05);}
    .event-block{
      position:absolute;left:4px;right:4px;
      background:linear-gradient(135deg,rgba(0,122,255,0.14),rgba(0,122,255,0.07));
      border-left:3px solid var(--accent);border-radius:8px;
      padding:4px 8px;font-size:12px;font-weight:600;color:var(--accent);
      cursor:pointer;z-index:2;box-shadow:0 2px 8px rgba(0,122,255,0.12);
    }
    /* week strip */
    .week-day{
      flex:1;display:flex;flex-direction:column;align-items:center;
      gap:3px;padding:8px 4px;border-radius:12px;cursor:pointer;
      transition:background 0.15s;
    }
    .week-day:hover{background:rgba(0,122,255,0.08);}
    .week-day.today{background:rgba(0,122,255,0.1);}
    .week-day.selected{background:var(--accent);}
    .week-day.selected .wdn,.week-day.selected .wdnum{color:#fff!important;}
    .wdn{font-size:10px;font-weight:600;color:var(--text2);}
    .wdnum{font-size:16px;font-weight:700;}
    .week-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);}
    .week-day.selected .week-dot{background:rgba(255,255,255,0.7);}

    /* ---- KANBAN ---- */
    .kanban-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;}
    .kanban-grid{display:grid;grid-template-columns:1fr;gap:12px;}
    .accordion-header{
      width:100%;display:flex;align-items:center;justify-content:space-between;
      padding:14px 16px;background:none;border:none;cursor:pointer;text-align:left;
    }
    .accordion-body{display:none;}
    .accordion-body.open{display:block;}
    .chevron{transition:transform 0.22s cubic-bezier(.34,1.56,.64,1);color:var(--text3);}
    .chevron.open{transform:rotate(180deg);}
    .task-item{
      display:flex;align-items:flex-start;gap:10px;padding:11px 16px;
      border-top:1px solid var(--sep);cursor:pointer;transition:background 0.1s;
    }
    .task-item:active{background:rgba(0,0,0,0.03);}
    .task-check{
      width:20px;height:20px;border-radius:50%;border:2px solid var(--sep);
      flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;
      transition:all 0.2s cubic-bezier(.34,1.56,.64,1);
    }
    .task-check.done{background:var(--green);border-color:var(--green);}
    .pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:6px;}
    .p-hoch{background:var(--red);}
    .p-mittel{background:var(--orange);}
    .p-niedrig{background:var(--green);}

    /* ---- DIARY ---- */
    .diary-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;display:flex;flex-direction:column;gap:12px;}

    /* ---- MODAL ---- */
    .modal-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,0.3);
      backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
      z-index:500;display:flex;align-items:flex-end;
      opacity:0;pointer-events:none;transition:opacity 0.25s;
    }
    .modal-overlay.open{opacity:1;pointer-events:all;}
    .modal-box{
      background:var(--glass-strong);
      backdrop-filter:blur(40px) saturate(200%);-webkit-backdrop-filter:blur(40px) saturate(200%);
      border:1px solid var(--glass-border);
      border-top-left-radius:24px;border-top-right-radius:24px;
      width:100%;max-height:90dvh;overflow-y:auto;
      padding:20px 20px 36px;
      transform:translateY(100%);
      transition:transform 0.32s cubic-bezier(0.32,0.72,0,1);
      box-shadow:0 -4px 40px rgba(31,38,135,0.12);
    }
    .modal-overlay.open .modal-box{transform:translateY(0);}
    .modal-handle{width:36px;height:4px;background:var(--text3);border-radius:2px;margin:0 auto 20px;opacity:0.35;}

    /* ---- INPUTS ---- */
    .input-field{
      width:100%;background:rgba(120,120,128,0.08);border:1px solid var(--sep);
      border-radius:var(--r-sm);padding:12px 14px;font-size:15px;
      font-family:inherit;outline:none;color:var(--text);
      transition:border-color 0.15s,background 0.15s;
    }
    .input-field:focus{border-color:var(--accent);background:rgba(0,122,255,0.04);}
    textarea.input-field{line-height:1.6;}
    .btn-primary{
      background:var(--accent);color:#fff;border:none;border-radius:var(--r-sm);
      padding:14px 20px;font-size:15px;font-weight:600;cursor:pointer;width:100%;
      transition:opacity 0.15s,transform 0.1s;font-family:inherit;
    }
    .btn-primary:active{opacity:0.85;transform:scale(0.99);}
    .btn-secondary{
      background:rgba(120,120,128,0.1);color:var(--text);border:none;
      border-radius:var(--r-sm);padding:14px 20px;font-size:15px;
      font-weight:500;cursor:pointer;width:100%;font-family:inherit;
    }

    /* ---- REMINDER ---- */
    .reminder-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--sep);}
    .reminder-dot{width:9px;height:9px;border-radius:50%;background:var(--accent);flex-shrink:0;animation:rpulse 2s infinite;}
    @keyframes rpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}

    /* ---- PATIENTEN ---- */
    .pat-dash{
      padding:16px;
      background:linear-gradient(135deg,rgba(175,82,222,.1),rgba(88,86,214,.06));
    }

    /* ---- SCROLLBAR ---- */
    ::-webkit-scrollbar{width:0;height:0;}

    /* ======================== DESKTOP ======================== */
    @media(min-width:768px){
      body{overflow:hidden;}
      #sidebar{display:flex;}
      #bottom-nav{display:none;}
      .page-header{padding:20px 28px 16px;}
      .home-scroll{
        display:grid;
        grid-template-columns:1fr 1fr;
        grid-template-rows:auto auto 1fr;
        gap:20px;padding:24px;
        align-content:start;overflow-y:auto;height:100%;
      }
      .reminders-section{grid-column:1/-1;}
      .day-plan-section{grid-column:1;}
      .week-plan-section{grid-column:2;}
      .kanban-scroll{padding:24px;}
      .kanban-grid{grid-template-columns:repeat(2,1fr);gap:16px;}
      .diary-scroll{padding:24px;}
      /* modal centered */
      .modal-overlay{align-items:center;justify-content:center;}
      .modal-box{
        border-radius:24px;width:min(500px,90vw);max-height:80dvh;
        transform:translateY(16px) scale(0.97);
      }
      .modal-overlay.open .modal-box{transform:translateY(0) scale(1);}
    }
    @media(min-width:1200px){
      #sidebar{width:260px;}
    }
  </style>
</head>
<body>
<div id="app">

<!-- ========== SIDEBAR ========== -->
<nav id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon">âšˇ</div>
    Cowork
  </div>
  <div class="sidebar-section">Navigation</div>
  <button class="sidebar-item active" onclick="showTab('home')" id="side-home">

    Heute
  </button>
  <button class="sidebar-item" onclick="showTab('kanban')" id="side-kanban">

  </button>
  <button class="sidebar-item" onclick="showTab('diary')" id="side-diary">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>

  </button>

      Einstellungen
    </button>
  </div>
</nav>

<!-- ========== MAIN CONTENT ========== -->
<div id="main-content">

<!-- ===== HOME ===== -->
<div id="tab-home" class="tab-content active">
  <div class="page-header">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <div>
        <div id="home-date" style="font-size:22px;font-weight:800;letter-spacing:-0.5px;"></div>
        <div id="home-weekday" style="font-size:13px;color:var(--text2);margin-top:1px;font-weight:500;"></div>
      </div>
      <button onclick="openSettings()" style="width:34px;height:34px;border-radius:50%;border:1px solid var(--glass-border);background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--glass-shadow);">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </div>
  <div class="home-scroll">
    <div id="reminders-section" class="reminders-section" style="display:none;">
      <div class="section-label">Erinnerungen heute</div>
      <div class="glass-card"><div id="reminders-list"></div></div>
    </div>
    <div class="day-plan-section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <div class="section-label" style="margin:0;">Tagesplan</div>
        <button onclick="openAddEvent('day')" style="font-size:13px;color:var(--accent);font-weight:600;background:none;border:none;cursor:pointer;padding:2px 0;">+ Eintrag</button>
      </div>
      <div class="glass-card" style="padding:4px 0;"><div id="day-grid"></div></div>
    </div>
    <div class="week-plan-section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <div class="section-label" style="margin:0;">Wochenplan</div>
        <button onclick="openAddEvent('week')" style="font-size:13px;color:var(--accent);font-weight:600;background:none;border:none;cursor:pointer;padding:2px 0;">+ Eintrag</button>
      </div>
      <div class="glass-card">
        <div id="week-strip" style="display:flex;gap:4px;padding:12px 10px 8px;"></div>
        <div id="week-events" style="min-height:56px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text2);padding:8px 12px 14px;"></div>
      </div>
    </div>
  </div>
</div>

<!-- ===== KANBAN ===== -->
<div id="tab-kanban" class="tab-content">
  <div class="page-header">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <div style="font-size:20px;font-weight:800;letter-spacing:-0.3px;">Kanban</div>
      <button onclick="openAddTask()" style="background:var(--accent);color:#fff;border:none;border-radius:10px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;">+ Task</button>

  </div>

    <div id="kanban-grid" class="kanban-grid"></div>
  </div>
</div>

<!-- ===== DIARY ===== -->

  <div class="page-header">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <div style="font-size:20px;font-weight:800;letter-spacing:-0.3px;">Tagebuch</div>
      <button onclick="openAddDiary()" style="background:var(--accent);color:#fff;border:none;border-radius:10px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;">+ Eintrag</button>
    </div>
  </div>
  <div class="diary-scroll" id="diary-list"></div>
</div>

</div><!-- /main-content -->

<!-- ========== BOTTOM NAV ========== -->
<nav id="bottom-nav">
  <button class="nav-item active" onclick="showTab('home')" id="nav-home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Heute
  </button>
  <button class="nav-item" onclick="showTab('kanban')" id="nav-kanban">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="11" rx="1"/></svg>Kanban
  </button>
  <button class="nav-item" onclick="showTab('diary')" id="nav-diary">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Tagebuch
  </button>
</nav>

</div><!-- /app -->

<!-- ========== MODALS ========== -->
<!-- Event Modal -->
<div id="modal-event" class="modal-overlay" onclick="closeModal('modal-event',event)">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div style="font-size:18px;font-weight:700;margin-bottom:20px;" id="modal-event-title">Eintrag</div>
    <div style="display:flex;flex-direction:column;gap:10px;">

<script>
// ============================================================
// DB
// ============================================================
const DB_NAME='CoworkDashboard';const DB_VERSION=1;let db;
async function initDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,DB_VERSION);r.onupgradeneeded=e=>{const d=e.target.result;['events','tasks','diary','settings'].forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,{keyPath:s==='settings'?'key':'id'});});};r.onsuccess=e=>{db=e.target.result;res();};r.onerror=rej;});}
const dbGet=(s,k)=>new Promise(r=>db.transaction(s).objectStore(s).get(k).onsuccess=e=>r(e.target.result));
const dbGetAll=s=>new Promise(r=>db.transaction(s).objectStore(s).getAll().onsuccess=e=>r(e.target.result));
const dbPut=(s,o)=>new Promise(r=>db.transaction(s,'readwrite').objectStore(s).put(o).onsuccess=r);
const dbDel=(s,k)=>new Promise(r=>db.transaction(s,'readwrite').objectStore(s).delete(k).onsuccess=r);
const uuid=()=>crypto.randomUUID?crypto.randomUUID():Date.now().toString(36)+Math.random().toString(36).slice(2);

// ============================================================
// SETTINGS
// ============================================================
let S={githubUser:'ctmos',githubRepo:'CoworkKanban-data',githubToken:''};
async function loadSettings(){const u=await dbGet('settings','githubUser');const r=await dbGet('settings','githubRepo');const t=await dbGet('settings','githubToken');if(u)S.githubUser=u.value;if(r)S.githubRepo=r.value;if(t)S.githubToken=t.value;}
function openSettings(){document.getElementById('settings-user').value=S.githubUser;document.getElementById('settings-repo').value=S.githubRepo;document.getElementById('settings-token').value=S.githubToken;openModal('modal-settings');}
async function saveSettings(){S.githubUser=document.getElementById('settings-user').value.trim()||'ctmos';S.githubRepo=document.getElementById('settings-repo').value.trim()||'CoworkKanban-data';S.githubToken=document.getElementById('settings-token').value.trim();await dbPut('settings',{key:'githubUser',value:S.githubUser});await dbPut('settings',{key:'githubRepo',value:S.githubRepo});await dbPut('settings',{key:'githubToken',value:S.githubToken});setSyncStatus('Gespeichert âś“');setTimeout(()=>closeModal('modal-settings'),800);}

// ============================================================
// NAV
// ============================================================
let currentTab='home';
function showTab(t){
  document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));
  ['nav-','side-'].forEach(p=>{const el=document.getElementById(p+t);if(el)el.classList.add('active');});
  ['nav-home','nav-kanban','nav-diary','side-home','side-kanban','side-diary'].forEach(id=>{const el=document.getElementById(id);if(el&&!id.endsWith(t))el.classList.remove('active');});
  document.getElementById('tab-'+t).classList.add('active');
  currentTab=t;
  if(t==='home')renderHome();if(t==='kanban')renderKanban();if(t==='diary')renderDiary();
}

// ============================================================
// MODALS
// ============================================================
const openModal=id=>document.getElementById(id).classList.add('open');
function closeModal(id,e){if(e&&e.target!==document.getElementById(id))return;document.getElementById(id).classList.remove('open');}

// ============================================================
// HOME
// ============================================================
let selWeek=null;
function renderHome(){
  const now=new Date();
  const days=['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
  const months=['Jan','Feb','MĂ¤r','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  document.getElementById('home-date').textContent=`${now.getDate()}. ${months[now.getMonth()]} ${now.getFullYear()}`;
  document.getElementById('home-weekday').textContent=days[now.getDay()];
  renderDayGrid();renderWeekStrip();renderReminders();
}

async function renderReminders(){
  const tasks=await dbGetAll('tasks');const today=new Date().toISOString().slice(0,10);
  const due=tasks.filter(t=>t.reminderAt&&t.reminderAt.slice(0,10)===today&&t.status!=='done');
  const sec=document.getElementById('reminders-section');const list=document.getElementById('reminders-list');
  if(!due.length){sec.style.display='none';return;}
  sec.style.display='block';
  list.innerHTML=due.map(t=>`<div class="reminder-item"><div class="reminder-dot"></div><div style="flex:1;"><div style="font-size:13px;font-weight:600;">${t.title}</div><div style="font-size:11px;color:var(--text2);">${t.category} Â· ${t.reminderAt?.slice(11,16)||''}</div></div></div>`).join('');
}

async function renderDayGrid(){
  const today=new Date().toISOString().slice(0,10);
  const events=(await dbGetAll('events')).filter(e=>e.date===today);
  const grid=document.getElementById('day-grid');
  const hours=[];for(let h=7;h<=22;h++)hours.push(h);
  grid.innerHTML=hours.map(h=>{
    const lbl=h+':00';
    const hEv=events.filter(e=>e.startTime&&parseInt(e.startTime)===h);
    const evH=hEv.map(e=>`<div class="event-block" onclick="event.stopPropagation();deleteEvent('${e.id}')"><div style="font-size:10px;opacity:.7;">${e.startTime||''} ${e.endTime?'â†’ '+e.endTime:''}</div><div>${e.title}</div></div>`).join('');
    return `<div class="time-slot" onclick="quickAddEvent('${lbl}')"><div class="time-label">${lbl}</div><div class="time-line">${evH}</div></div>`;
  }).join('');
}

async function renderWeekStrip(){
  const strip=document.getElementById('week-strip');
  const now=new Date();const day=now.getDay();
  const mon=new Date(now);mon.setDate(now.getDate()-(day===0?6:day-1));
  const dns=['Mo','Di','Mi','Do','Fr','Sa','So'];
  const allEv=await dbGetAll('events');const today=now.toISOString().slice(0,10);
  strip.innerHTML=Array.from({length:7},(_,i)=>{
    const d=new Date(mon);d.setDate(mon.getDate()+i);
    const ds=d.toISOString().slice(0,10);
    const isT=ds===today;const isSel=ds===selWeek;
    const hasEv=allEv.some(e=>e.date===ds);
    return `<div class="week-day ${isT?'today':''} ${isSel?'selected':''}" onclick="selectWeekDay('${ds}')"><div class="wdn">${dns[i]}</div><div class="wdnum" style="color:${isT?'var(--accent)':'var(--text)'};">${d.getDate()}</div>${hasEv?`<div class="week-dot"></div>`:`<div style="height:5px;"></div>`}</div>`;
  }).join('');
}

async function selectWeekDay(ds){
  selWeek=ds;renderWeekStrip();
  const ev=(await dbGetAll('events')).filter(e=>e.date===ds);
  const el=document.getElementById('week-events');
  if(!ev.length){el.innerHTML=`<span style="color:var(--text2);font-size:13px;">Keine EintrĂ¤ge</span>`;return;}
  el.innerHTML=`<div style="width:100%;">`+ev.sort((a,b)=>(a.startTime||'').localeCompare(b.startTime||'')).map(e=>`<div style="display:flex;gap:10px;padding:9px 12px;border-bottom:1px solid var(--sep);"><div style="font-size:12px;color:var(--accent);font-weight:700;min-width:38px;">${e.startTime||''}</div><div style="flex:1;font-size:13px;font-weight:500;">${e.title}</div></div>`).join('')+`</div>`;
}

let addEvType='day';
function openAddEvent(type){
  addEvType=type;
  document.getElementById('modal-event-title').textContent=type==='day'?'Tagesplan â€“ Eintrag':'Wochenplan â€“ Eintrag';
  const today=new Date().toISOString().slice(0,10);
  document.getElementById('event-date').value=selWeek&&type==='week'?selWeek:today;
  ['event-title','event-start','event-end','event-note'].forEach(id=>document.getElementById(id).value='');
  openModal('modal-event');
}
function quickAddEvent(lbl){
  addEvType='day';
  document.getElementById('modal-event-title').textContent='Tagesplan â€“ Eintrag';
  document.getElementById('event-date').value=new Date().toISOString().slice(0,10);
  document.getElementById('event-start').value=parseInt(lbl)+':00';
  document.getElementById('event-end').value=(parseInt(lbl)+1)+':00';
  document.getElementById('event-title').value='';document.getElementById('event-note').value='';
  openModal('modal-event');
}
async function saveEvent(){
  const title=document.getElementById('event-title').value.trim();if(!title)return;
  const ev={id:uuid(),title,date:document.getElementById('event-date').value,startTime:document.getElementById('event-start').value,endTime:document.getElementById('event-end').value,note:document.getElementById('event-note').value.trim(),type:addEvType,createdAt:new Date().toISOString()};
  await dbPut('events',ev);closeModal('modal-event');renderHome();syncData();
}
async function deleteEvent(id){if(!confirm('Eintrag lĂ¶schen?'))return;await dbDel('events',id);renderHome();syncData();}

// ============================================================
// KANBAN
// ============================================================
const CATS=[
  {id:'Barmelweid',icon:'đźŹĄ',color:'#0ea5e9',bg:'rgba(14,165,233,.07)',br:'rgba(14,165,233,.25)'},
  {id:'Patienten',icon:'đź‘¤',color:'#af52de',bg:'rgba(175,82,222,.07)',br:'rgba(175,82,222,.25)',special:true},
  {id:'Privat',icon:'đźŹ ',color:'#34c759',bg:'rgba(52,199,89,.07)',br:'rgba(52,199,89,.25)'},
  {id:'PSP',icon:'đź“‹',color:'#ff9500',bg:'rgba(255,149,0,.07)',br:'rgba(255,149,0,.25)'}
];
const STOĐ['backlog','todo','inprogress','done'];
const STL={backlog:'Backlog',todo:'Todo',inprogress:'In Progress',done:'Done'};
let openCats=new Set();

async function renderKanban(){
  const tasks=await dbGetAll('tasks');
  const container=document.getElementById('kanban-grid');
  container.innerHTML=CATS.map(cat=>{
    const ct=tasks.filter(t=>t.category===cat.id);
    const open=openCats.has(cat.id);
    const nOpen=ct.filter(t=>t.status!=='done').length;
    return `<div class="glass-card" style="border-color:${cat.br};">
      <button class="accordion-header" onclick="toggleCat('${cat.id}')" style="background:${cat.bg};">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:22px;">${cat.icon}</span>
          <div>
            <div style="font-size:15px;font-weight:700;">${cat.id}</div>
            ${cat.special?`<div style="font-size:10px;font-weight:700;color:${cat.color};text-transform:uppercase;letter-spacing:.04em;">Dashboard</div>`:''}
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          ${nOpen>0?`<span style="font-size:12px;font-weight:700;background:rgba(0,0,0,0.05);padding:2px 9px;border-radius:99px;color:var(--text2);">${nOpen}</span>`:''}
          <svg class="chevron ${open?'open':''}" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </button>
      <div class="accordion-body ${open?'open':''}">${cat.special?renderPatDash(ct):renderCatTasks(cat.id,ct)}</div>
    </div>`;
  }).join('');
}

function renderCatTasks(catId,tasks){
  if(!tasks.length)return`<div style="padding:16px;font-size:13px;color:var(--text2);">Keine Tasks Â· <button onclick="openAddTask('${catId}')" style="color:var(--accent);font-weight:600;background:none;border:none;cursor:pointer;">+ hinzufĂĽgen</button></div>`;
  return STO.map(st=>{
    const sts=tasks.filter(t=>t.status===st);if(!sts.length)return'';
    return`<div><div style="padding:4px 16px 6px;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;">${STL[st]}</div>${sts.map(t=>`<div class="task-item" onclick="cycleStatus('${t.id}')"><div class="task-check ${t.status==='done'?'done':''}">${t.status==='done'?'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>':''}</div><div class="pdot p-${t.priority}"></div><div style="flex:1;"><div style="font-size:13px;font-weight:500;${t.status==='done'?'text-decoration:line-through;color:var(--text3);':''}">${t.title}</div>${t.deadline?`<div style="font-size:11px;color:var(--text2);">đź“… ${t.deadline}</div>`:''}</div></div>`).join('')}</div>`;
  }).join('');
}

function renderPatDash(tasks){
  const n=tasks.filter(t=>t.status!=='done').length;
  return`<div class="pat-dash"><div style="font-size:10px;font-weight:700;color:#af52de;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;">Patienten Dashboard</div><div style="display:flex;align-items:center;gap:12px;"><div style="font-size:38px;font-weight:900;color:#6d28d9;line-height:1;">${n}</div><div style="font-size:12px;color:#7c3aed;line-height:1.4;">offene<br>Tasks</div></div><div style="margin-top:10px;font-size:12px;color:#9333ea;opacity:.7;">Detailansicht folgt â†—</div></div>${renderCatTasks('Patienten',tasks)}`;
}

function toggleCat(id){if(openCats.has(id))openCats.delete(id);else openCats.add(id);renderKanban();}

async function cycleStatus(id){
  const tasks=await dbGetAll('tasks');const t=tasks.find(x=>x.id===id);if(!t)return;
  const i=STO.indexOf(t.status);t.status=STO[(i+1)%STO.length];t.updatedAt=new Date().toISOString();
  await dbPut('tasks',t);renderKanban();syncData();
}

function openAddTask(pre){
  if(pre)document.getElementById('task-category').value=pre;
  document.getElementById('task-title').value='';document.getElementById('task-deadline').value='';
  openModal('modal-task');
}
async function saveTask(){
  const title=document.getElementById('task-title').value.trim();if(!title)return;
  const t={id:uuid(),title,category:document.getElementById('task-category').value,status:document.getElementById('task-status').value,priority:document.getElementById('task-priority').value,deadline:document.getElementById('task-deadline').value||null,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()};
  await dbPut('tasks',t);closeModal('modal-task');if(currentTab==='kanban')renderKanban();syncData();
}

// ============================================================
// DIARY
// ============================================================
async function renderDiary(){
  const entries=await dbGetAll('diary');
  const container=document.getElementById('diary-list');
  if(!entries.length){container.innerHTML=`<div class="glass-card" style="padding:32px;text-align:center;color:var(--text2);font-size:14px;">Noch keine EintrĂ¤ge</div>`;return;}
  const byDate={};entries.forEach(e=>{if(!byDate[e.date])byDate[e.date]=[];byDate[e.date].push(e);});
  const sorted=Object.keys(byDate).sort((a,b)=>b.localeCompare(a));
  container.innerHTML=sorted.map(date=>{
    const de=byDate[date];const open=openCats.has('d-'+date);
    const d=new Date(date+'T12:00:00');
    const lbl=d.toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    return`<div class="glass-card"><button class="accordion-header" onclick="toggleDiary('${date}')"><div><div style="font-size:14px;font-weight:700;">${lbl}</div><div style="font-size:11px;color:var(--text2);margin-top:2px;">${de.length} Eintrag${de.length>1?'e':''}</div></div><svg class="chevron ${open?'open':''}" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></button><div class="accordion-body ${open?'open':''}"><div style="padding:0 14px 14px;">${de.map(e=>`<div style="margin-bottom:10px;padding:12px;background:rgba(120,120,128,0.06);border-radius:10px;"><div style="font-size:11px;color:var(--text2);margin-bottom:5px;">${new Date(e.createdAt).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})}</div><div style="font-size:14px;line-height:1.6;white-space:pre-wrap;">${e.text}</div></div>`).join('')}</div></div></div>`;
  }).join('');
}

function toggleDiary(d){const k='d-'+d;if(openCats.has(k))openCats.delete(k);else openCats.add(k);renderDiary();}

function openAddDiary(){
  document.getElementById('diary-date-input').value=new Date().toISOString().slice(0,10);
  document.getElementById('diary-text').value='';openModal('modal-diary');
}
async function saveDiary(){
  const text=document.getElementById('diary-text').value.trim();if(!text)return;
  const e={id:uuid(),date:document.getElementById('diary-date-input').value,text,createdAt:new Date().toISOString()};
  await dbPut('diary',e);closeModal('modal-diary');if(currentTab==='diary')renderDiary();syncData();
}

// ============================================================
// DICTATION
// ============================================================
let rec=null,isRec=false;
function startDictation(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('Diktieren nur in Chrome/Safari');return;}
  if(isRec){rec?.stop();return;}
  rec=new SR();rec.lang='de-DE';rec.continuous=true;rec.interimResults=false;
  rec.onresult=e=>{const t=Array.from(e.results).map(r=>r[0].transcript).join(' ');const ta=document.getElementById('diary-text');ta.value=ta.value?ta.value+' '+t:t;};
  rec.onend=()=>{isRec=false;document.getElementById('dict-label').textContent='Diktieren';document.getElementById('dict-btn').style.background='rgba(120,120,128,.08)';};
  rec.start();isRec=true;
  document.getElementById('dict-label').textContent='âŹą Aufnahme stoppen';
  document.getElementById('dict-btn').style.background='rgba(255,59,48,.1)';
}

// ============================================================
// GITHUB SYNC
// ============================================================
const setSyncStatus=m=>{const el=document.getElementById('sync-status-text');if(el)el.textContent=m;};
async function syncData(){
  if(!S.githubToken||!S.githubUser)return;
  try{
    const tasks=await dbGetAll('tasks');const diary=await dbGetAll('diary');const events=await dbGetAll('events');
    await ghPut('data/tasks.json',JSON.stringify(tasks,null,2));
    await ghPut('data/diary.json',JSON.stringify(diary,null,2));
    await ghPut('data/events.json',JSON.stringify(events,null,2));
  }catch(e){console.warn('Sync failed',e);}
}
async function syncNow(){
  if(!S.githubToken){setSyncStatus('Bitte Token eingeben');return;}
  setSyncStatus('Synchronisiere...');
  try{
    const t=await ghGet('data/tasks.json');const d=await ghGet('data/diary.json');const ev=await ghGet('data/events.json');
    if(t)for(const x of t)await dbPut('tasks',x);
    if(d)for(const x of d)await dbPut('diary',x);
    if(ev)for(const x of ev)await dbPut('events',x);
    await syncData();
    setSyncStatus('Synchronisiert âś“ '+new Date().toLocaleTimeString('de-DE'));
    if(currentTab==='home')renderHome();if(currentTab==='kanban')renderKanban();if(currentTab==='diary')renderDiary();
  }catch(e){setSyncStatus('Fehler: '+e.message);}
}
async function ghGet(path){
  const res=await fetch(`https://api.github.com/repos/${S.githubUser}/${S.githubRepo}/contents/${path}`,{headers:{Authorization:`token ${S.githubToken}`}});
  if(!res.ok)return null;const data=await res.json();return JSON.parse(atob(data.content.replace(/\n/g,'')));
}
async function ghPut(path,content){
  const url=`https://api.github.com/repos/${S.githubUser}/${S.githubRepo}/contents/${path}`;
  let sha;try{const r=await fetch(url,{headers:{Authorization:`token ${S.githubToken}`}});if(r.ok){const d=await r.json();sha=d.sha;}}catch{}
  const body={message:`sync ${new Date().toISOString()}`,content:btoa(unescape(encodeURIComponent(content)))};
  if(sha)body.sha=sha;
  await fetch(url,{method:'PUT',headers:{Authorization:`token ${S.githubToken}`,'Content-Type':'application/json'},body:JSON.stringify(body)});
}

if('serviceWorker'in navigator)navigator.serviceWorker.register(URL.createObjectURL(new Blob([swCode],{type:'application/javascript'}))).catch(()=>{});
const manifest={name:'CoworkDashboard',short_name:'Dashboard',start_url:'./',display:'standalone',background_color:'#ddd6fe', theme_color:'#667eea',icons:[{src:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="%23667eea"/><stop offset="1" stop-color="%2306b6d4"/></linearGradient></defs><rect width="512" height="512" rx="100" fill="url(%23g)"/><rect x="60" y="80" width="160" height="352" rx="20" fill="white" opacity=".9"/><rect x="260" y="80" width="192" height="220" rx="20" fill="white" opacity=".9"/><rect x="260" y="320" width="192" height="112" rx="20" fill="white" opacity=".5"/></svg>',sizes:'512x512',type:'image/svg+xml'}]};
const mL=document.createElement('link');mL.rel='manifest';mL.href=URL,.createObjectURL(new Blob([JSON.stringify(manifest)],{type:'application/json'}));document.head.appendChild(mL);

(async()=>{await initDB();await loadSettings();renderHome();})();
