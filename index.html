<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1e293b">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>CoworkDashboard</title>
<style>
:root{
  --nav-bg:#1e293b;--nav-text:#e2e8f0;--bg:#f8fafc;--card-bg:#ffffff;
  --lane-bg:#f1f5f9;--heute-bg:#ede9fe;--border:#e2e8f0;
  --text:#1e293b;--text-muted:#64748b;
  --primary:#2563eb;--primary-h:#1d4ed8;
  --danger:#ef4444;--danger-h:#dc2626;
  --dot-gray:#9ca3af;--dot-red:#ef4444;--dot-yellow:#f59e0b;--dot-green:#22c55e;
}
body.dark{
  --nav-bg:#0f172a;--bg:#1e293b;--card-bg:#293548;
  --lane-bg:#1e293b;--heute-bg:#3b2f6e;--border:#475569;
  --text:#f1f5f9;--text-muted:#94a3b8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
/* NAV */
.nav{background:var(--nav-bg);display:flex;overflow-x:auto;position:sticky;top:0;z-index:100;flex-shrink:0;}
.nav::-webkit-scrollbar{height:3px;}
.nav::-webkit-scrollbar-thumb{background:#475569;}
.nav button{background:none;border:none;color:var(--nav-text);padding:13px 18px;font-size:14px;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;transition:.15s;position:relative;}
.nav button:hover{background:#334155;}
.nav button.active{border-bottom-color:var(--primary);color:#fff;background:#334155;}
.nav-badge{background:#ef4444;color:#fff;border-radius:10px;font-size:10px;padding:1px 5px;margin-left:3px;font-weight:700;display:none;}
.nav-badge.on{display:inline;}
/* TABS */
.tab{display:none;flex:1;overflow:hidden;}
.tab.active{display:flex;flex-direction:column;}
/* KANBAN */
#tab-kanban{flex-direction:row;overflow:hidden;}
.lanes-wrap{display:flex;gap:13px;padding:13px;overflow-x:auto;flex:1;align-items:flex-start;}
.lane{min-width:285px;max-width:285px;background:var(--lane-bg);border-radius:10px;border:1px solid var(--border);display:flex;flex-direction:column;max-height:calc(100vh - 57px);flex-shrink:0;}
.lane.hl{background:var(--heute-bg);border-color:#c4b5fd;}
.lane.collapsed .lane-body{display:none;}
.lane-hdr{padding:9px 11px;font-weight:700;font-size:13px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;background:inherit;border-radius:10px 10px 0 0;position:sticky;top:0;z-index:2;}
.lane-hdr-r{display:flex;align-items:center;gap:4px;}
.lane-caret{font-size:11px;opacity:.5;margin-right:2px;transition:.15s;}
.lane.collapsed .lane-caret{transform:rotate(-90deg);}
.lane-body{padding:7px;overflow-y:auto;flex:1;}
.btn-add{background:var(--primary);color:#fff;border:none;border-radius:5px;padding:3px 9px;font-size:11px;cursor:pointer;flex-shrink:0;}
.btn-add:hover{background:var(--primary-h);}
/* CARDS */
.card{background:var(--card-bg);border-radius:7px;padding:9px 10px;margin-bottom:6px;box-shadow:0 1px 3px rgba(0,0,0,.07);cursor:pointer;transition:box-shadow .15s;}
.card:hover{box-shadow:0 3px 10px rgba(0,0,0,.11);}
.card-top{display:flex;align-items:center;gap:5px;}
.sdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.sdot.gray{background:var(--dot-gray);}
.sdot.red{background:var(--dot-red);}
.sdot.yellow{background:var(--dot-yellow);}
.sdot.green{background:var(--dot-green);}
.cpfx{font-weight:700;color:var(--primary);white-space:nowrap;font-size:11px;}
.ctit{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;}
.cdate{font-size:11px;color:var(--text-muted);margin-top:2px;padding-left:14px;}
/* MODAL */
.moverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;justify-content:center;align-items:center;}
.moverlay.open{display:flex;}
.modal{background:var(--card-bg);border-radius:12px;padding:20px;width:90%;max-width:440px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.modal h3{margin-bottom:13px;font-size:16px;color:var(--text);}
.modal label{display:block;font-size:11px;font-weight:700;margin-bottom:3px;margin-top:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;}
.modal input,.modal textarea,.modal select{width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--text);}
.modal textarea{min-height:80px;resize:vertical;}
.modal input:focus,.modal textarea:focus,.modal select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px rgba(37,99,235,.12);}
.mbtns{display:flex;gap:7px;margin-top:16px;flex-wrap:wrap;}
.mbtns button{padding:7px 14px;border-radius:6px;border:none;font-size:13px;cursor:pointer;font-weight:500;}
.btn-pri{background:var(--primary);color:#fff;}
.btn-pri:hover{background:var(--primary-h);}
.btn-sec{background:var(--lane-bg);color:var(--text);border:1px solid var(--border)!important;}
.btn-sec:hover{background:var(--border);}
.btn-cancel{background:var(--lane-bg);color:var(--text-muted);}
.btn-cancel:hover{background:var(--border);}
.btn-dang{background:var(--danger);color:#fff;}
.btn-dang:hover{background:var(--danger-h);}
.btn-heute{background:#7c3aed;color:#fff;}
.btn-heute:hover{background:#6d28d9;}
/* STATUS SELECTOR */
.ssel{display:flex;gap:7px;margin-top:4px;flex-wrap:wrap;}
.sopt{display:flex;align-items:center;gap:4px;cursor:pointer;padding:5px 9px;border-radius:6px;border:2px solid transparent;font-size:12px;color:var(--text);}
.sopt.sel{border-color:var(--primary);background:rgba(37,99,235,.07);}
.sopt .d{width:9px;height:9px;border-radius:50%;}
/* HEUTE TAB */
#tab-heute{overflow-y:auto;}
.ht-wrap{max-width:680px;margin:0 auto;padding:16px;}
.ht-head{margin-bottom:16px;}
.ht-date{font-size:21px;font-weight:700;}
.ht-sum{font-size:13px;color:var(--text-muted);margin-top:3px;}
.ht-card{background:var(--card-bg);border-radius:10px;padding:11px 13px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.07);display:flex;align-items:flex-start;gap:10px;cursor:pointer;transition:box-shadow .15s;}
.ht-card:hover{box-shadow:0 3px 12px rgba(0,0,0,.1);}
.ht-card.done{opacity:.6;}
.ht-cb{flex-shrink:0;width:21px;height:21px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;margin-top:1px;font-size:11px;font-weight:700;background:var(--card-bg);color:transparent;transition:.15s;}
.ht-cb.chk{background:var(--dot-green);border-color:var(--dot-green);color:#fff;}
.ht-body{flex:1;min-width:0;}
.ht-trow{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.ht-title{font-weight:600;font-size:14px;}
.ht-title.thru{text-decoration:line-through;color:var(--text-muted);}
.lbadge{font-size:10px;padding:2px 7px;border-radius:10px;color:#fff;white-space:nowrap;font-weight:600;}
.ht-sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-left:auto;}
.ht-dl{font-size:12px;color:var(--text-muted);margin-top:2px;}
.ht-dl.over{color:var(--danger);font-weight:600;}
.ht-desc{font-size:12px;color:var(--text-muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ht-foot{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;}
.ht-foot button{padding:8px 14px;border-radius:7px;border:none;font-size:13px;cursor:pointer;font-weight:500;}
.ht-empty{text-align:center;padding:44px 16px;}
.ht-empty p{color:var(--text-muted);margin-bottom:14px;}
/* PATIENTEN */
#tab-patienten{overflow-y:auto;}
.pt-wrap{max-width:680px;margin:0 auto;padding:16px;}
.pt-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px;flex-wrap:wrap;gap:8px;}
.pt-head h2{font-size:19px;}
.pt-search{padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--card-bg);color:var(--text);width:170px;}
.pt-search:focus{outline:none;border-color:var(--primary);}
.pt-item{background:var(--card-bg);border-radius:8px;padding:11px 13px;margin-bottom:7px;box-shadow:0 1px 3px rgba(0,0,0,.07);display:flex;justify-content:space-between;align-items:center;gap:10px;}
.pt-code{font-weight:700;font-size:15px;letter-spacing:.3px;}
.pt-sbadge{display:inline-block;font-size:11px;padding:2px 7px;border-radius:10px;font-weight:600;margin-left:7px;}
.pt-sbadge.aktiv{background:#dcfce7;color:#166534;}
.pt-sbadge.entlassen{background:#f1f5f9;color:#64748b;}
.pt-sbadge.pause{background:#fef9c3;color:#854d0e;}
.pt-detail{font-size:12px;color:var(--text-muted);margin-top:2px;}
.pt-acts button{background:none;border:1px solid var(--border);border-radius:5px;cursor:pointer;font-size:12px;padding:3px 8px;color:var(--text-muted);margin-left:4px;}
.pt-acts button:hover{background:var(--lane-bg);}
.pt-acts .del:hover{background:#fee2e2;color:var(--danger);border-color:var(--danger);}
/* AUTONOMIE-LOG */
#tab-autonomie-log{overflow-y:auto;}
.al-wrap{max-width:680px;margin:0 auto;padding:16px;}
.al-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px;}
.al-head h2{font-size:19px;}
.al-entry{background:var(--card-bg);border-radius:10px;padding:13px 15px;margin-bottom:9px;box-shadow:0 1px 3px rgba(0,0,0,.07);border-left:4px solid var(--border);}
.al-entry.success{border-left-color:var(--dot-green);}
.al-entry.warning{border-left-color:var(--dot-yellow);}
.al-entry.error{border-left-color:var(--dot-red);}
.al-entry.read{opacity:.5;}
.al-ehead{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.al-ts{font-size:11px;color:var(--text-muted);}
.al-sb{font-size:11px;padding:2px 7px;border-radius:10px;font-weight:600;}
.al-sb.success{background:#dcfce7;color:#166534;}
.al-sb.warning{background:#fef9c3;color:#854d0e;}
.al-sb.error{background:#fee2e2;color:#991b1b;}
.al-title{font-weight:700;font-size:14px;margin-top:6px;}
.al-desc{font-size:13px;color:var(--text-muted);margin-top:3px;}
.al-rbtn{margin-top:9px;background:none;border:1px solid var(--border);border-radius:5px;padding:3px 11px;font-size:12px;cursor:pointer;color:var(--text-muted);}
.al-rbtn:hover{background:var(--lane-bg);}
/* EINSTELLUNGEN */
#tab-einstellungen{overflow-y:auto;}
.set-wrap{max-width:500px;margin:0 auto;padding:16px;}
.set-wrap h2{font-size:19px;margin-bottom:16px;}
.set-sec{margin-bottom:20px;}
.set-sec h3{font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.set-input{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:inherit;background:var(--card-bg);color:var(--text);margin-bottom:7px;}
.set-input:focus{outline:none;border-color:var(--primary);}
.set-btn{display:block;width:100%;padding:10px;margin-bottom:7px;border-radius:7px;font-size:13px;cursor:pointer;border:1px solid var(--border);background:var(--card-bg);color:var(--text);text-align:left;font-weight:500;}
.set-btn:hover{background:var(--lane-bg);}
.set-btn.pri{background:var(--primary);color:#fff;border:none;}
.set-btn.pri:hover{background:var(--primary-h);}
.set-btn.dng{background:var(--danger);color:#fff;border:none;}
.set-btn.dng:hover{background:var(--danger-h);}
.theme-row{display:flex;gap:7px;}
.tbtn{flex:1;padding:8px;border-radius:6px;border:2px solid var(--border);background:var(--card-bg);color:var(--text);cursor:pointer;font-size:13px;font-weight:500;}
.tbtn.on{border-color:var(--primary);background:rgba(37,99,235,.07);color:var(--primary);}
/* VORLAGEN */
.vwrap{position:relative;display:inline-block;}
.vbtn{background:#1d4ed8;color:#fff;border:none;border-radius:5px;padding:3px 7px;font-size:11px;cursor:pointer;}
.vbtn:hover{background:#1e40af;}
.vdrop{display:none;position:absolute;top:100%;right:0;background:var(--card-bg);border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:50;min-width:210px;padding:3px 0;margin-top:3px;}
.vdrop.open{display:block;}
.vdrop button{display:block;width:100%;text-align:left;background:none;border:none;padding:7px 12px;font-size:13px;cursor:pointer;color:var(--text);}
.vdrop button:hover{background:var(--lane-bg);}
/* TOKEN WIDGET */
.tok-widget{background:var(--card-bg);border-radius:10px;padding:14px 16px;margin-top:18px;box-shadow:0 1px 4px rgba(0,0,0,.07);border:1px solid var(--border);}
.tok-widget h3{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.tok-progress-wrap{background:var(--lane-bg);border-radius:10px;height:10px;overflow:hidden;margin-bottom:6px;}
.tok-bar{height:100%;border-radius:10px;background:var(--primary);transition:width .4s;}
.tok-bar.warn{background:var(--dot-yellow);}
.tok-bar.danger{background:var(--dot-red);}
.tok-stats{display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);margin-bottom:12px;}
.tok-entries{display:flex;flex-direction:column;gap:5px;}
.tok-entry{display:flex;align-items:center;gap:8px;font-size:12px;padding:6px 8px;background:var(--lane-bg);border-radius:6px;}
.tok-model{font-weight:700;font-size:10px;padding:2px 6px;border-radius:8px;color:#fff;white-space:nowrap;}
.tok-model.opus{background:#7c3aed;}
.tok-model.sonnet{background:#2563eb;}
.tok-model.haiku{background:#059669;}
.tok-status{font-size:10px;padding:2px 6px;border-radius:8px;font-weight:600;}
.tok-status.running{background:#fef9c3;color:#854d0e;}
.tok-status.planned{background:#f1f5f9;color:#64748b;}
.tok-status.done{background:#dcfce7;color:#166534;}
.tok-task{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tok-est{color:var(--text-muted);white-space:nowrap;}
.tok-edit-area{margin-top:10px;display:none;}
.tok-edit-area textarea{width:100%;min-height:100px;padding:7px 9px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:monospace;background:var(--bg);color:var(--text);resize:vertical;}
/* MOBILE */
.mob-nav{display:none;align-items:center;justify-content:center;gap:8px;padding:7px;background:var(--bg);position:sticky;top:0;z-index:10;border-bottom:1px solid var(--border);}
.mob-nav button{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 12px;cursor:pointer;font-size:15px;color:var(--text);}
.mob-nav span{font-size:13px;font-weight:700;min-width:120px;text-align:center;}
.ldots{display:none;gap:5px;justify-content:center;padding:4px;}
.ldot{width:7px;height:7px;border-radius:50%;background:var(--border);cursor:pointer;}
.ldot.on{background:var(--primary);}
@media(max-width:768px){
  .lanes-wrap{gap:0;padding:0;overflow:hidden;}
  .lane{min-width:calc(100vw - 16px);max-width:calc(100vw - 16px);margin:8px;max-height:calc(100vh - 115px);}
  .mob-nav{display:flex;}
  .ldots{display:flex;}
}
</style>
</head>
<body>
<nav class="nav" id="mainNav">
  <button data-tab="heute" class="active">Heute</button>
  <button data-tab="kanban">Kanban</button>
  <button data-tab="patienten">Patienten</button>
  <button data-tab="autonomie-log">Autonomie-Log <span id="alBadge" class="nav-badge"></span></button>
  <button data-tab="einstellungen">Einstellungen</button>
</nav>

<div class="tab active" id="tab-heute">
  <div class="ht-wrap" id="htContainer"></div>
</div>

<div class="tab" id="tab-kanban">
  <div class="mob-nav" id="mobNav">
    <button id="lanePrev">&#8592;</button>
    <span id="laneDisplay"></span>
    <button id="laneNext">&#8594;</button>
  </div>
  <div class="ldots" id="laneDots"></div>
  <div class="lanes-wrap" id="lanesContainer"></div>
</div>

<div class="tab" id="tab-patienten">
  <div class="pt-wrap">
    <div class="pt-head">
      <h2>Patienten</h2>
      <div style="display:flex;gap:8px;align-items:center;">
        <input type="text" id="patSearch" class="pt-search" placeholder="Suche...">
        <button class="btn-pri" id="addPat" style="padding:7px 13px;border-radius:6px;border:none;font-size:13px;cursor:pointer;font-weight:500;">+ Patient</button>
      </div>
    </div>
    <div id="patList"></div>
  </div>
</div>

<div class="tab" id="tab-autonomie-log">
  <div class="al-wrap">
    <div class="al-head">
      <h2>Autonomie-Log</h2>
      <button class="btn-sec" id="alLoad" style="padding:6px 12px;border-radius:6px;border:1px solid var(--border);font-size:13px;cursor:pointer;font-weight:500;background:var(--lane-bg);color:var(--text);">&#8635; Laden</button>
    </div>
    <div id="alList"></div>
  </div>
</div>

<div class="tab" id="tab-einstellungen">
  <div class="set-wrap">
    <h2>Einstellungen</h2>
    <div class="set-sec">
      <h3>GitHub Token</h3>
      <input type="password" id="ghToken" class="set-input" placeholder="ghp_...">
      <button class="set-btn pri" id="saveToken">Token speichern</button>
    </div>
    <div class="set-sec">
      <h3>Design</h3>
      <div class="theme-row">
        <button class="tbtn on" id="thLight">&#9728; Hell</button>
        <button class="tbtn" id="thDark">&#9790; Dunkel</button>
      </div>
    </div>
    <div class="set-sec">
      <h3>Daten</h3>
      <button class="set-btn" id="exportBtn">&#8595; Exportieren</button>
      <button class="set-btn" id="importBtn">&#8593; Importieren</button>
      <input type="file" id="importFile" accept=".json" style="display:none;">
      <button class="set-btn dng" id="resetBtn">Alle Daten löschen</button>
    </div>
    <p style="font-size:12px;color:var(--text-muted);margin-top:8px;">CoworkDashboard v2.0 &mdash; Single-file PWA</p>
  </div>
</div>

<!-- Card Modal -->
<div class="moverlay" id="cardModal">
  <div class="modal">
    <h3 id="cmHead">Karte</h3>
    <label>Überschrift *</label>
    <input type="text" id="cmTitle">
    <label>Status</label>
    <div class="ssel" id="cmStatus">
      <div class="sopt sel" data-val="gray"><span class="d" style="background:var(--dot-gray)"></span>Offen</div>
      <div class="sopt" data-val="red"><span class="d" style="background:var(--dot-red)"></span>Blockiert</div>
      <div class="sopt" data-val="yellow"><span class="d" style="background:var(--dot-yellow)"></span>In Arbeit</div>
      <div class="sopt" data-val="green"><span class="d" style="background:var(--dot-green)"></span>Erledigt</div>
    </div>
    <label>Deadline</label>
    <input type="date" id="cmDeadline">
    <label>Beschreibung</label>
    <textarea id="cmDesc"></textarea>
    <div class="mbtns">
      <button class="btn-cancel" id="cmCancel">Abbrechen</button>
      <button class="btn-heute" id="cmToH" style="display:none;">&#8594; Heute</button>
      <button class="btn-dang" id="cmDel" style="display:none;">Löschen</button>
      <button class="btn-pri" id="cmSave">Speichern</button>
    </div>
  </div>
</div>

<!-- Patient Modal -->
<div class="moverlay" id="patModal">
  <div class="modal">
    <h3 id="pmHead">Patient</h3>
    <label>Code * (z.B. MÜL0226)</label>
    <input type="text" id="pmCode" maxlength="12" placeholder="XXX-MMYY">
    <label>Aufnahmedatum</label>
    <input type="date" id="pmAdm">
    <label>Status</label>
    <select id="pmStat">
      <option value="aktiv">Aktiv</option>
      <option value="pause">Pause</option>
      <option value="entlassen">Entlassen</option>
    </select>
    <label>Notizen</label>
    <textarea id="pmNotes"></textarea>
    <div class="mbtns">
      <button class="btn-cancel" id="pmCancel">Abbrechen</button>
      <button class="btn-dang" id="pmDel" style="display:none;">Löschen</button>
      <button class="btn-pri" id="pmSave">Speichern</button>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';
/* ---- LANES ---- */
const LANES=[
  {id:'barmelweid',  name:'BA \u2014 Barmelweid',        prefix:'BA',isBA:true},
  {id:'pat_admin',   name:'PA \u2014 Patienten-Admin',    prefix:'PA'},
  {id:'weiterbild',  name:'WB \u2014 Weiterbildung',      prefix:'WB'},
  {id:'selbst',      name:'SI \u2014 Selbst & Identit\xe4t',prefix:'SI'},
  {id:'finanzen',    name:'FI \u2014 Finanzen',           prefix:'FI'},
  {id:'freizeit',    name:'FR \u2014 Freizeit & Familie', prefix:'FR'},

/* ---- STORAGE KEYS ---- */
const KC='cowork_cards',KP='cowork_patients',KS='cowork_settings',KA='cowork_autonomy_log',KT='github_token';
/* ---- STATE ---- */
let cards={},counters={},patients=[],settings={theme:'light'},alog=[];

/* ---- LOAD/SAVE ---- */
function loadAll(){
  // migrate old data
  try{const old=localStorage.getItem('coworkdashboard_data');
    if(old){const d=JSON.parse(old);if(d.cards&&!localStorage.getItem(KC)){localStorage.setItem(KC,JSON.stringify({cards:d.cards,counters:d.cardCounters||{}}));}}
  }catch(e){}
  try{const r=JSON.parse(localStorage.getItem(KC)||'{}');cards=r.cards||{};counters=r.counters||{};}catch(e){cards={};counters={};}
  try{patients=JSON.parse(localStorage.getItem(KP)||'[]');}catch(e){patients=[];}
  try{settings=JSON.parse(localStorage.getItem(KS)||'{"theme":"light"}');}catch(e){settings={theme:'light'};}
  try{alog=JSON.parse(localStorage.getItem(KA)||'null');}catch(e){alog=null;}
  if(!alog){
    alog=[{id:'demo-001',timestamp:'2026-03-23T00:00:00.000Z',title:'Testlauf 2026-03-23 \u2014 14 Tasks',desc:'Vollst\xe4ndiger Rebuild CoworkDashboard. 14 Lanes, Patienten-Tab, Autonomie-Log deployt.',status:'success',read:false}];
    localStorage.setItem(KA,JSON.stringify(alog));
  }
  LANES.forEach(l=>{if(!counters[l.prefix])counters[l.prefix]=0;});
}
function saveCards(){localStorage.setItem(KC,JSON.stringify({cards,counters}));}
function savePatients(){localStorage.setItem(KP,JSON.stringify(patients));}
function saveSettings(){localStorage.setItem(KS,JSON.stringify(settings));}
function saveAlog(){localStorage.setItem(KA,JSON.stringify(alog));}

/* ---- UTILS ---- */
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function fmt(d){if(!d)return'';const p=d.split('-');return p[2]+'.'+p[1]+'.'+p[0];}
function today(){return new Date().toISOString().slice(0,10);}
function priOf(s){return{red:0,yellow:1,gray:2,green:3}[s]??2;}
function laneById(id){return LANES.find(l=>l.id===id);}
function laneByPfx(p){return LANES.find(l=>l.prefix===p);}

/* ---- NAV ---- */
function switchTab(t){
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.id==='tab-'+t));
  if(t==='heute')renderHeute();
  if(t==='kanban')renderLanes();
  if(t==='patienten')renderPatienten();
  if(t==='autonomie-log')renderAlog();
  if(t==='einstellungen')renderSettings();
}
document.querySelectorAll('.nav button').forEach(b=>{
  b.addEventListener('click',()=>switchTab(b.dataset.tab));
});

/* ---- HEUTE ---- */
function renderHeute(){
  const c=document.getElementById('htContainer');
  const all=Object.values(cards).filter(x=>x.inHeute&&!x.archived);
  all.sort((a,b)=>priOf(a.status)-priOf(b.status));
  const done=all.filter(x=>x.status==='green').length;
  const dateStr=new Date().toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'});
  if(!all.length){
    c.innerHTML=`<div class="ht-empty"><p style="font-size:36px;margin-bottom:10px;">&#128197;</p><p>Kein Plan f\xfcr heute &mdash; \xfcbertrage Karten aus dem Kanban</p><button class="btn-pri" onclick="switchTab('kanban')" style="padding:9px 16px;border-radius:7px;border:none;font-size:13px;cursor:pointer;margin-top:6px;">Zum Kanban</button></div>`;
    renderTokenWidget(c);
    return;
  }
  c.innerHTML=`<div class="ht-head"><div class="ht-date">${esc(dateStr)}</div><div class="ht-sum">${all.length} Aufgabe${all.length!==1?'n':''} &mdash; ${all.length-done} offen &mdash; ${done} erledigt</div></div><div id="htCards"></div><div class="ht-foot"><button class="btn-sec" id="htBack" style="padding:8px 14px;border-radius:7px;border:1px solid var(--border);font-size:13px;cursor:pointer;font-weight:500;background:var(--lane-bg);color:var(--text);">Alle zur\xfcckschieben</button><button class="btn-pri" id="htAdd" style="padding:8px 14px;border-radius:7px;border:none;font-size:13px;cursor:pointer;font-weight:500;">+ Neue Aufgabe</button></div>`;
  const list=document.getElementById('htCards');
  all.forEach(card=>{
    const isDone=card.status==='green';
    const orig=card.originalLane||card.lane;
    const lc=LANE_COLORS[orig]||'#64748b';
    const ln=laneById(orig);
    const lname=ln&&orig!=='heute'?ln.name.replace(/^[A-Z]+ \u2014 /,''):'';
    const over=card.deadline&&card.deadline<today()&&!isDone;
    const el=document.createElement('div');
    el.className='ht-card'+(isDone?' done':'');
    el.innerHTML=`<div class="ht-cb${isDone?' chk':''}" data-id="${card.id}">${isDone?'&#10003;':''}</div><div class="ht-body"><div class="ht-trow"><span class="ht-title${isDone?' thru':''}">${esc(card.id)} &mdash; ${esc(card.title)}</span>${lname?`<span class="lbadge" style="background:${lc}">${esc(lname)}</span>`:''}<span class="ht-sdot sdot ${card.status}" style="background:${{gray:'var(--dot-gray)',red:'var(--dot-red)',yellow:'var(--dot-yellow)',green:'var(--dot-green)'}[card.status]||'var(--dot-gray)'}"></span></div>${card.deadline?`<div class="ht-dl${over?' over':''}">${over?'&#9888; ':''}${fmt(card.deadline)}${over?' &mdash; \xfcberf\xe4llig':''}</div>`:''}${card.description?`<div class="ht-desc">${esc(card.description.substring(0,80))}</div>`:''}</div>`;
    el.querySelector('.ht-cb').addEventListener('click',e=>{e.stopPropagation();const cc=cards[card.id];if(!cc)return;cc.status=cc.status==='green'?'gray':'green';saveCards();renderHeute();});
    el.querySelector('.ht-body').addEventListener('click',()=>openCardModal(null,card.id));
    list.appendChild(el);
  });
  document.getElementById('htBack').addEventListener('click',()=>{
    const hc=Object.values(cards).filter(x=>x.inHeute&&!x.archived);
    if(!hc.length)return;
    if(!confirm(hc.length+' Karte'+(hc.length!==1?'n':'')+' zur\xfcckschieben?'))return;
    hc.forEach(cc=>{cc.inHeute=false;if(cc.originalLane){cc.lane=cc.originalLane;cc.originalLane=null;}});
    saveCards();renderHeute();if(document.getElementById('tab-kanban').classList.contains('active'))renderLanes();
  });
  document.getElementById('htAdd').addEventListener('click',()=>openCardModal('heute',null));
  renderTokenWidget(document.getElementById('htContainer'));
}

/* ---- LANES / KANBAN ---- */
function renderLanes(){
  const con=document.getElementById('lanesContainer');
  con.innerHTML='';
  LANES.forEach((lane,idx)=>{
    const lc=Object.values(cards).filter(c=>lane.isHeute?(c.inHeute&&!c.archived):(c.lane===lane.id&&!c.inHeute&&!c.archived));
    const la=Object.values(cards).filter(c=>lane.isHeute?(c.inHeute&&c.archived):(c.lane===lane.id&&c.archived));
    const el=document.createElement('div');
    el.className='lane'+(lane.isHeute?' hl':'')+(collapsedLanes.has(lane.id)?' collapsed':'');
    const vorlagen=lane.isBA?`<div class="vwrap"><button class="vbtn" data-lane="${lane.id}">Vorlagen &#9660;</button><div class="vdrop" id="vdrop_${lane.id}">${BA_TPLS.map((t,i)=>`<button data-ti="${i}">${esc(t.t)}</button>`).join('')}</div></div>`:'';
    el.innerHTML=`<div class="lane-hdr" data-lid="${lane.id}"><span><span class="lane-caret">&#9660;</span>${esc(lane.name)}</span><div class="lane-hdr-r">${vorlagen}<button class="btn-add" data-lane="${lane.id}">+ Karte</button></div></div><div class="lane-body"><div class="lane-cards" data-lane="${lane.id}"></div><div style="border-top:1px solid var(--border);margin-top:6px;"><button class="arch-tog" data-lid="${lane.id}" style="width:100%;background:none;border:none;padding:6px 10px;text-align:left;font-size:11px;color:var(--text-muted);cursor:pointer;">Archiv (${la.length})</button><div class="arch-body" data-lid="${lane.id}" style="display:none;padding:0 2px 4px;"></div></div></div>`;
    con.appendChild(el);
    const cd=el.querySelector('.lane-cards');
    lc.forEach(c=>cd.appendChild(makeCardEl(c)));
    const ab=el.querySelector('.arch-body');
    la.forEach(c=>ab.appendChild(makeCardEl(c,true)));
    el.querySelector('.lane-hdr').addEventListener('click',e=>{
      if(e.target.closest('.btn-add,.vwrap'))return;
      collapsedLanes.has(lane.id)?collapsedLanes.delete(lane.id):collapsedLanes.add(lane.id);
      el.classList.toggle('collapsed');
    });
    el.querySelector('.btn-add').addEventListener('click',e=>{e.stopPropagation();openCardModal(lane.id,null);});
    if(lane.isBA){
      el.querySelector('.vbtn').addEventListener('click',e=>{e.stopPropagation();document.getElementById('vdrop_'+lane.id).classList.toggle('open');});
      el.querySelectorAll('.vdrop button').forEach(b=>{
        b.addEventListener('click',e=>{e.stopPropagation();document.getElementById('vdrop_'+lane.id).classList.remove('open');openCardModal(lane.id,null,parseInt(b.dataset.ti));});
      });
    }
    el.querySelector('.arch-tog').addEventListener('click',()=>{const ab2=el.querySelector('.arch-body');ab2.style.display=ab2.style.display==='none'?'block':'none';});
  });
  document.addEventListener('click',()=>document.querySelectorAll('.vdrop.open').forEach(d=>d.classList.remove('open')),{once:false});
  updateMobNav();
}

function makeCardEl(card,archived=false){
  const el=document.createElement('div');
  el.className='card';
  el.innerHTML=`<div class="card-top"><span class="sdot ${card.status}"></span><span class="cpfx">${esc(card.id)}</span><span class="ctit">${esc(card.title)}</span></div>${card.deadline?`<div class="cdate">${fmt(card.deadline)}</div>`:''}`;
  el.addEventListener('click',()=>openCardModal(null,card.id));
  if(archived)el.style.opacity='.6';
  return el;
}

/* ---- CARD MODAL ---- */
function openCardModal(laneId,cardId,tplIdx=null){
  editCardId=cardId;
  const isEdit=!!cardId;
  const card=isEdit?cards[cardId]:null;
  const targetLane=laneId||(card?card.lane:null);
  const lane=laneById(targetLane)||LANES[0];
  document.getElementById('cmHead').textContent=isEdit?card.id+' bearbeiten':'Neue Karte \u2014 '+lane.name;
  document.getElementById('cmTitle').value=isEdit?card.title:'';
  document.getElementById('cmDeadline').value=isEdit?(card.deadline||''):'';
  document.getElementById('cmDesc').value=isEdit?(card.description||''):'';
  document.querySelectorAll('#cmStatus .sopt').forEach(o=>o.classList.toggle('sel',o.dataset.val===(isEdit?card.status:'gray')));
  document.getElementById('cmToH').style.display=isEdit&&!card.inHeute?'inline-block':'none';
  document.getElementById('cmDel').style.display=isEdit?'inline-block':'none';
  if(tplIdx!==null){const t=BA_TPLS[tplIdx];document.getElementById('cmTitle').value=t.t;document.getElementById('cmDesc').value=t.d;}
  // store target lane for save
  document.getElementById('cardModal').dataset.lane=targetLane;
  document.getElementById('cardModal').classList.add('open');
  document.getElementById('cmTitle').focus();
}
document.getElementById('cmCancel').addEventListener('click',()=>document.getElementById('cardModal').classList.remove('open'));
document.getElementById('cardModal').addEventListener('click',e=>{if(e.target===document.getElementById('cardModal'))document.getElementById('cardModal').classList.remove('open');});
document.querySelectorAll('#cmStatus .sopt').forEach(o=>{
  o.addEventListener('click',()=>{document.querySelectorAll('#cmStatus .sopt').forEach(x=>x.classList.remove('sel'));o.classList.add('sel');});
});
document.getElementById('cmSave').addEventListener('click',()=>{
  const title=document.getElementById('cmTitle').value.trim();
  if(!title){alert('\xdcberschrift ist erforderlich.');return;}
  const status=document.querySelector('#cmStatus .sopt.sel')?.dataset.val||'gray';
  const deadline=document.getElementById('cmDeadline').value||null;
  const desc=document.getElementById('cmDesc').value.trim();
  if(editCardId){
    const c=cards[editCardId];
    c.title=title;c.status=status;c.deadline=deadline;c.description=desc;
  } else {
    const laneId=document.getElementById('cardModal').dataset.lane;
    const lane=laneById(laneId)||LANES[0];
    counters[lane.prefix]=(counters[lane.prefix]||0)+1;
    const id=lane.prefix+String(counters[lane.prefix]).padStart(3,'0');
    cards[id]={id,lane:laneId,inHeute:lane.isHeute||false,originalLane:null,title,status,deadline,description:desc,archived:false,createdAt:new Date().toISOString()};
  }
  saveCards();
  document.getElementById('cardModal').classList.remove('open');
  if(document.getElementById('tab-kanban').classList.contains('active'))renderLanes();
  if(document.getElementById('tab-heute').classList.contains('active'))renderHeute();
});
document.getElementById('cmToH').addEventListener('click',()=>{
  if(!editCardId)return;
  const c=cards[editCardId];
  c.originalLane=c.originalLane||c.lane;
  c.inHeute=true;
  saveCards();
  document.getElementById('cardModal').classList.remove('open');
  if(document.getElementById('tab-kanban').classList.contains('active'))renderLanes();
  if(document.getElementById('tab-heute').classList.contains('active'))renderHeute();
});
document.getElementById('cmDel').addEventListener('click',()=>{
  if(!editCardId)return;
  const c=cards[editCardId];
  if(!confirm('Karte "'+editCardId+'" l\xf6schen?'))return;
  delete cards[editCardId];
  saveCards();
  document.getElementById('cardModal').classList.remove('open');
  if(document.getElementById('tab-kanban').classList.contains('active'))renderLanes();
  if(document.getElementById('tab-heute').classList.contains('active'))renderHeute();
});

/* ---- PATIENTEN ---- */
function renderPatienten(filter=''){
  const list=document.getElementById('patList');
  list.innerHTML='';
  const f=filter.toLowerCase();
  const shown=patients.filter(p=>!f||p.code.toLowerCase().includes(f)||(p.notes||'').toLowerCase().includes(f));
  if(!shown.length){list.innerHTML=`<p style="color:var(--text-muted);padding:20px 0;text-align:center;">${filter?'Keine Treffer.':'Noch keine Patienten.'}</p>`;return;}
  shown.forEach((p,i)=>{
    const idx=patients.indexOf(p);
    const el=document.createElement('div');
    el.className='pt-item';
    el.innerHTML=`<div style="flex:1;min-width:0;"><div><span class="pt-code">${esc(p.code)}</span><span class="pt-sbadge ${p.status||'aktiv'}">${esc(p.status||'aktiv')}</span></div><div class="pt-detail">${p.admissionDate?'Aufnahme: '+fmt(p.admissionDate)+'  ':''} ${p.notes?esc(p.notes.substring(0,60))+(p.notes.length>60?'\u2026':''):''}</div></div><div class="pt-acts"><button class="edit" data-i="${idx}">Bearbeiten</button><button class="del" data-i="${idx}">L\xf6schen</button></div>`;
    el.querySelector('.edit').addEventListener('click',()=>openPatModal(idx));
    el.querySelector('.del').addEventListener('click',()=>{if(!confirm('Patient "'+p.code+'" l\xf6schen?'))return;patients.splice(idx,1);savePatients();renderPatienten(document.getElementById('patSearch').value);});
    list.appendChild(el);
  });
}
document.getElementById('patSearch').addEventListener('input',e=>renderPatienten(e.target.value));
document.getElementById('addPat').addEventListener('click',()=>openPatModal(null));
function openPatModal(idx){
  editPatIdx=idx;
  const p=idx!==null?patients[idx]:null;
  document.getElementById('pmHead').textContent=p?'Patient bearbeiten':'Neuer Patient';
  document.getElementById('pmCode').value=p?p.code:'';
  document.getElementById('pmAdm').value=p?(p.admissionDate||''):'';
  document.getElementById('pmStat').value=p?(p.status||'aktiv'):'aktiv';
  document.getElementById('pmNotes').value=p?(p.notes||''):'';
  document.getElementById('pmDel').style.display=p?'inline-block':'none';
  document.getElementById('patModal').classList.add('open');
  document.getElementById('pmCode').focus();
}
document.getElementById('pmCancel').addEventListener('click',()=>document.getElementById('patModal').classList.remove('open'));
document.getElementById('patModal').addEventListener('click',e=>{if(e.target===document.getElementById('patModal'))document.getElementById('patModal').classList.remove('open');});
document.getElementById('pmSave').addEventListener('click',()=>{
  const code=document.getElementById('pmCode').value.trim();
  if(!code){alert('Code ist erforderlich.');return;}
  const obj={code,admissionDate:document.getElementById('pmAdm').value||null,status:document.getElementById('pmStat').value,notes:document.getElementById('pmNotes').value.trim()};

document.getElementById('pmDel').addEventListener('click',()=>{
  if(editPatIdx===null)return;
  if(!confirm('Patient l\xf6schen?'))return;
  patients.splice(editPatIdx,1);savePatients();
  document.getElementById('patModal').classList.remove('open');
  renderPatienten(document.getElementById('patSearch').value);
});

/* ---- AUTONOMIE-LOG ---- */
function renderAlog(){
  const list=document.getElementById('alList');
  list.innerHTML='';
  const sorted=[...alog].sort((a,b)=>(a.read===b.read)?0:a.read?1:-1);
  if(!sorted.length){list.innerHTML='<p style="color:var(--text-muted);padding:20px 0;text-align:center;">Keine Eintr\xe4ge.</p>';return;}
  sorted.forEach(entry=>{
    const el=document.createElement('div');
    el.className=`al-entry ${entry.status}${entry.read?' read':''}`;
    const ts=new Date(entry.timestamp).toLocaleString('de-DE');
    el.innerHTML=`<div class="al-ehead"><span class="al-ts">${esc(ts)}</span><span class="al-sb ${entry.status}">${{success:'&#10003; Erfolg',warning:'&#9888; Warnung',error:'&#10007; Fehler'}[entry.status]||entry.status}</span></div><div class="al-title">${esc(entry.title)}</div><div class="al-desc">${esc(entry.desc)}</div>${!entry.read?`<button class="al-rbtn" data-id="${entry.id}">Okay, gelesen &#10003;</button>`:''}`;
    if(!entry.read){el.querySelector('.al-rbtn').addEventListener('click',()=>{entry.read=true;saveAlog();renderAlog();updateAlBadge();});}
    list.appendChild(el);
  });
  updateAlBadge();
}
function updateAlBadge(){
  const n=alog.filter(e=>!e.read).length;
  const b=document.getElementById('alBadge');
  b.textContent=n||'';b.classList.toggle('on',n>0);
}
async function fetchAlogFromGH(){
  const tok=localStorage.getItem(KT);
  if(!tok){alert('Kein GitHub Token hinterlegt (Einstellungen).');return;}
  try{
    const r=await fetch('https://api.github.com/repos/ctmos/cowork-data/contents/autonomy-log.json',{headers:{Authorization:'token '+tok,Accept:'application/vnd.github.v3.raw'}});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const data=await r.json();
    if(Array.isArray(data)){alog=data;saveAlog();renderAlog();alert('Log geladen: '+data.length+' Eintr\xe4ge.');}
  }catch(e){alert('Fehler beim Laden: '+e.message);}
}
document.getElementById('alLoad').addEventListener('click',fetchAlogFromGH);

document.getElementById('exportBtn').addEventListener('click',()=>{

document.getElementById('importFile').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.cards)cards=d.cards;if(d.counters)counters=d.counters;if(d.patients)patients=d.patients;if(d.settings)settings=d.settings;if(d.alog)alog=d.alog;saveCards();savePatients();saveSettings();saveAlog();alert('Importiert.');switchTab('heute');}catch(err){alert('Fehler: '+err.message);}};
  r.readAsText(f);e.target.value='';
});
document.getElementById('resetBtn').addEventListener('click',()=>{
  if(!confirm('Wirklich ALLE Daten l\xf6schen?'))return;
  [KC,KP,KS,KA,KT].forEach(k=>localStorage.removeItem(k));
  loadAll();switchTab('heute');alert('Gel\xf6scht.');
});

/* ---- MOBILE LANE NAV ---- */
function updateMobNav(){
  const l=LANES[curLane];
  document.getElementById('laneDisplay').textContent=l?l.name:'';
  const dots=document.getElementById('laneDots');
  dots.innerHTML='';
  LANES.forEach((_,i)=>{const d=document.createElement('span');d.className='ldot'+(i===curLane?' on':'');d.addEventListener('click',()=>scrollLane(i));dots.appendChild(d);});
}
function scrollLane(idx){
  curLane=idx;
  const lanes=document.querySelectorAll('.lane');
  if(lanes[idx])lanes[idx].scrollIntoView({behavior:'smooth',inline:'start',block:'nearest'});
  updateMobNav();
}
document.getElementById('lanePrev').addEventListener('click',()=>{if(curLane>0)scrollLane(curLane-1);});
document.getElementById('laneNext').addEventListener('click',()=>{if(curLane<LANES.length-1)scrollLane(curLane+1);});
let tx=0,ty=0;
document.getElementById('lanesContainer').addEventListener('touchstart',e=>{tx=e.changedTouches[0].screenX;},{passive:true});
document.getElementById('lanesContainer').addEventListener('touchend',e=>{
  const dx=tx-e.changedTouches[0].screenX;
  if(window.innerWidth>768||Math.abs(dx)<50)return;
  if(dx>0&&curLane<LANES.length-1)scrollLane(curLane+1);
  else if(dx<0&&curLane>0)scrollLane(curLane-1);
},{passive:true});

/* ---- TOKEN WIDGET ---- */
const KTP='cowork_token_plan';
function loadTokenPlan(){
  try{const r=JSON.parse(localStorage.getItem(KTP));if(r&&r.entries)return r;}catch(e){}
  const demo={weekly_budget:1000000,weekly_used:800000,entries:[
    {task:'Dashboard Rebuild',model:'claude-opus-4-6',estimated:50000,status:'running'},
    {task:'Nacht-Autopilot heute',model:'claude-sonnet-4-6',estimated:100000,status:'planned'}
  ]};
  localStorage.setItem(KTP,JSON.stringify(demo));
  return demo;
}
function saveTokenPlan(obj){localStorage.setItem(KTP,JSON.stringify(obj));}
function modelClass(m){if(/opus/i.test(m))return'opus';if(/haiku/i.test(m))return'haiku';return'sonnet';}
function fmtK(n){return n>=1000?(n/1000).toFixed(0)+'k':String(n);}
function renderTokenWidget(container){
  const plan=loadTokenPlan();
  const pct=Math.min(100,Math.round((plan.weekly_used||0)/(plan.weekly_budget||1000000)*100));
  const barCls=pct>=90?'danger':pct>=70?'warn':'';
  const totalEst=(plan.entries||[]).reduce((s,e)=>s+(e.estimated||0),0);
  const el=document.createElement('div');
  el.className='tok-widget';
  el.innerHTML=`<h3>\uD83E\uDD16 Token & Modell <button id="tokEditBtn" style="font-size:11px;padding:3px 8px;border-radius:5px;border:1px solid var(--border);background:var(--lane-bg);color:var(--text);cursor:pointer;">Bearbeiten</button></h3><div class="tok-progress-wrap"><div class="tok-bar ${barCls}" style="width:${pct}%"></div></div><div class="tok-stats"><span>${fmtK(plan.weekly_used||0)} / ${fmtK(plan.weekly_budget||1000000)} Tokens (${pct}%)</span><span>Heute geplant: ~${fmtK(totalEst)}</span></div><div class="tok-entries">${(plan.entries||[]).map(e=>`<div class="tok-entry"><span class="tok-model ${modelClass(e.model)}">${esc(e.model.replace('claude-',''))}</span><span class="tok-task">${esc(e.task)}</span><span class="tok-est">~${fmtK(e.estimated||0)}</span><span class="tok-status ${e.status||'planned'}">${e.status==='running'?'l\xe4uft':e.status==='done'?'fertig':'geplant'}</span></div>`).join('')}</div><div class="tok-edit-area" id="tokEditArea"><textarea id="tokEditTxt"></textarea><div style="display:flex;gap:6px;margin-top:6px;"><button class="btn-pri" id="tokSave" style="padding:5px 12px;border:none;border-radius:5px;font-size:12px;cursor:pointer;font-weight:500;background:var(--primary);color:#fff;">Speichern</button><button class="btn-cancel" id="tokCancel" style="padding:5px 12px;border:none;border-radius:5px;font-size:12px;cursor:pointer;background:var(--lane-bg);color:var(--text-muted);">Abbrechen</button></div></div>`;
  container.appendChild(el);
  document.getElementById('tokEditBtn').addEventListener('click',()=>{
    const area=document.getElementById('tokEditArea');
    const isOpen=area.style.display==='block';
    area.style.display=isOpen?'none':'block';
    if(!isOpen)document.getElementById('tokEditTxt').value=JSON.stringify(plan,null,2);
  });
  document.getElementById('tokSave').addEventListener('click',()=>{
    try{const p=JSON.parse(document.getElementById('tokEditTxt').value);saveTokenPlan(p);document.getElementById('tokEditArea').style.display='none';renderHeute();}catch(e){alert('JSON-Fehler: '+e.message);}
  });
  document.getElementById('tokCancel').addEventListener('click',()=>{document.getElementById('tokEditArea').style.display='none';});
}

/* ---- INIT ---- */
loadAll();
if(settings.theme==='dark')document.body.classList.add('dark');
updateAlBadge();
renderHeute();
setTimeout(()=>{if(document.getElementById('tab-kanban').classList.contains('active'))renderLanes();},0);
})();
</script>
